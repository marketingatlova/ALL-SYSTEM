<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LOVA — Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a1f2e; 
      --navy-soft: #2d3447;
      --canvas: #f7f5f0; 
      --surface: #ffffff;
      --border: #e4e1db; 
      --text: #1a1f2e; 
      --text-2: #5a5750;
      --text-3: #9a9690;
      --accent: #c0392b;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; background: var(--canvas); min-height: 100vh; padding-bottom: 60px; overflow-x: hidden; position: relative; }
    
    /* Minimal Top Nav */
    .top-nav { background: var(--navy); padding: 13px 16px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(26,31,46,0.15); }
    .nav-wordmark { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 2px; text-transform: uppercase; }

    /* Profile Header Section */
    .profile-header { display: flex; flex-direction: column; align-items: center; padding: 45px 20px 30px; text-align: center; }
    
    /* Easter Egg Logo Trigger */
    .profile-logo-wrapper { position: relative; display: flex; align-items: center; justify-content: center; width: 84px; height: 84px; background: var(--navy); border-radius: 50%; color: #fff; font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 700; box-shadow: 0 8px 24px rgba(26,31,46,0.12); animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; cursor: pointer; user-select: none; transition: transform 0.1s; }
    .profile-logo-wrapper:active { transform: scale(0.9); background: var(--accent); }
    
    .profile-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; margin-bottom: 4px; animation: slideUpFade 0.6s ease forwards 0.1s; opacity: 0; }
    .profile-subtitle { font-size: 13px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 2px; animation: slideUpFade 0.6s ease forwards 0.2s; opacity: 0; }

    /* Content & Links */
    .content { padding: 0 20px; max-width: 540px; margin: 0 auto; width: 100%; position: relative; z-index: 10; }
    
    .category-section { margin-bottom: 32px; }
    .category-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--navy); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 16px; letter-spacing: 0.5px; opacity: 0; animation: slideUpFade 0.5s ease forwards; }

    .link-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-bottom: 14px; text-decoration: none; color: var(--text); font-weight: 600; font-size: 15px; box-shadow: 0 2px 8px rgba(26,31,46,0.03); position: relative; overflow: hidden; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease, border-color 0.3s ease; opacity: 0; animation: slideUpFade 0.5s ease forwards; }
    
    .link-btn::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--navy); transform: scaleY(0); transform-origin: bottom; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    
    @media (hover: hover) {
      .link-btn:hover { transform: translateY(-4px) scale(1.01); box-shadow: 0 10px 20px rgba(26, 31, 46, 0.08); border-color: var(--navy-soft); }
      .link-btn:hover::before { transform: scaleY(1); }
      .link-btn:hover .link-arrow { transform: translateX(6px); color: var(--navy); }
      .link-btn:hover .link-text { transform: translateX(4px); }
    }
    .link-btn:active { transform: translateY(0) scale(0.98); box-shadow: 0 2px 4px rgba(26, 31, 46, 0.05); }
    
    .link-text { transition: transform 0.3s ease; }
    .link-arrow { color: var(--border); font-size: 18px; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s ease; font-weight: 400; }

    /* Animations & Loading */
    @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    .skeleton-loader { display: flex; flex-direction: column; gap: 14px; width: 100%; margin-top: 20px; }
    .skeleton-box { height: 62px; width: 100%; background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%); background-size: 200% 100%; animation: loadingPulse 1.5s infinite; border-radius: 14px; border: 1px solid var(--border); }
    @keyframes loadingPulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .error-msg { text-align: center; color: var(--accent); font-size: 13px; font-weight: 500; background: #fdf0ef; padding: 16px; border-radius: 10px; border: 1px solid #f5c6c2; display: none; margin-top: 20px; }

    /* --- SECRET BOBBLEHEAD ARCADE GAME OVERLAY --- */
    #gameOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(26, 31, 46, 0.95); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; touch-action: none; }
    
    .game-header { color: #fff; text-align: center; margin-bottom: 20px; }
    .game-header h2 { font-family: 'Playfair Display', serif; font-size: 28px; letter-spacing: 1px; margin-bottom: 5px; color: #fcd34d; text-transform: uppercase; }
    .game-header p { font-size: 13px; color: var(--text-3); }
    
    #gameCanvas { width: 90%; max-width: 600px; height: 220px; background: var(--canvas); border-radius: 16px; position: relative; overflow: hidden; border-bottom: 6px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-top: 4px solid var(--navy); }
    
    /* Character Sprite Bases (Self-Contained Inline Graphics) */
    .bobble-head-lucas { width: 50px; height: 50px; border-radius: 50%; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUh4withLucasCartoonBase64Here...'); background-size: contain; background-repeat: no-repeat; background-color:#DDD; position:absolute; z-index: 2; border: 3px solid #FFF; box-shadow:0 4px 8px rgba(0,0,0,0.1); }
    .bobble-suit-lucas { width: 40px; height: 50px; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUh4withLucasSuitCartoonBase64Here...'); background-size: contain; background-repeat: no-repeat; position:absolute; z-index: 1; top: 15px; }

    .bobble-head-jeriko { width: 55px; height: 55px; border-radius: 50%; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUh4withJerikoCartoonBase64Here...'); background-size: contain; background-repeat: no-repeat; background-color:#CCC; position:absolute; z-index: 2; border: 3px solid #FFF; box-shadow:0 4px 8px rgba(0,0,0,0.1); }
    .bobble-coat-jeriko { width: 50px; height: 60px; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUh4withJerikoChefCoatCartoonBase64Here...'); background-size: contain; background-repeat: no-repeat; position:absolute; z-index: 1; top: 15px; }
    .bobble-hat-jeriko { width: 35px; height: 20px; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUh4withChefHatCartoonBase64Here...'); background-size: contain; background-repeat: no-repeat; position:absolute; z-index: 3; top: -10px; left: 50%; transform: translateX(-50%); }

    /* Main Entities */
    .bobble-character { position: absolute; bottom: 0; display: flex; flex-direction: column; align-items: center; transform-origin: center bottom; }
    #player { left: 10%; z-index: 10; }
    #player .bobble-head-lucas { bottom: 0; left: 50%; transform: translateX(-50%); }
    #player .bobble-suit-lucas { bottom: -10px; left: 50%; transform: translateX(-50%); }
    
    #obstacle { right: -60px; z-index: 5; }
    #obstacle .bobble-hat-jeriko { bottom: 45px; }
    #obstacle .bobble-head-jeriko { bottom: 0px; left: 50%; transform: translateX(-50%); border-color: var(--accent); }
    #obstacle .bobble-coat-jeriko { bottom: -15px; left: 50%; transform: translateX(-50%); }
    #obstacle::after { content: '🔥'; position: absolute; bottom: -10px; right: -15px; font-size: 28px; z-index: 4; } /* Fire effect trailing behind him */

    /* Jump & Physics Animations */
    .jump { animation: jumpAnim 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
    @keyframes jumpAnim { 0% { bottom: 0; } 40% { bottom: 120px; } 50% { bottom: 130px; } 60% { bottom: 120px; } 100% { bottom: 0; } }
    
    .bobble-head-bop { animation: headBop 0.3s ease infinite alternate; }
    @keyframes headBop { from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(2px); } }
    #player:not(.jump) .bobble-head-lucas { animation: headBop 0.3s ease infinite alternate; }

    /* Obstacle Animation */
    .slide { animation: slideAnim 1.2s infinite linear; }
    @keyframes slideAnim { 0% { right: -60px; } 100% { right: 100%; } }

    /* Collectible Items */
    .collectible { position: absolute; display: flex; align-items: center; justify-content: center; font-size: 32px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); z-index: 8; animation: floatItem 1s ease-in-out infinite alternate; }
    @keyframes floatItem { from { transform: translateY(-5px); } to { transform: translateY(5px); } }
    .slide-collect { animation: slideCollectAnim 1s infinite linear; }
    @keyframes slideCollectAnim { 0% { right: -50px; } 100% { right: 100%; } }

    /* UI & Game Over */
    #gameScore { color: #fff; font-size: 20px; font-weight: 700; margin-top: 20px; font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 2px; }
    .points-popup { position: absolute; color: #fcd34d; font-weight: 800; font-size: 22px; pointer-events: none; animation: popUpPoints 0.6s forwards; z-index: 20; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    @keyframes popUpPoints { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-30px) scale(1.5); } }

    #gameOverMsg { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 15px 25px; border-radius: 12px; text-align: center; color: var(--navy); font-weight: 700; z-index: 100; width: 80%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    #gameOverMsg p { margin-top: 10px; font-size: 12px; font-weight: 500; color: #555; }
    .close-game-btn { background: var(--surface); color: var(--navy); border: none; padding: 10px 20px; border-radius: 8px; margin-top: 30px; font-weight: 600; cursor: pointer; z-index: 10000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .close-game-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
  
  <div id="gameOverlay">
    <div class="game-header">
      <h2>LOVA Rush</h2>
      <p>Tap to jump! Catch food, dodge Chef.</p>
    </div>
    
    <div id="gameCanvas">
      <div id="player" class="bobble-character">
        <div class="bobble-head-lucas"></div>
        <div class="bobble-suit-lucas"></div>
      </div>
      
      <div id="obstacle" class="bobble-character">
        <div class="bobble-hat-jeriko"></div>
        <div class="bobble-head-jeriko"></div>
        <div class="bobble-coat-jeriko"></div>
      </div>
      
      <div id="entitiesContainer"></div>
      
      <div id="gameOverMsg">
        BURNT!<br><span style="font-size:12px; font-weight:500; color:#555;">Tap to Restart</span>
      </div>
    </div>
    
    <div id="gameScore">Score: <span id="gameScoreText">0</span></div>
    <button class="close-game-btn" onclick="closeGame()">Back to Work</button>
  </div>

  <nav class="top-nav">
    <div class="nav-wordmark">LOVA</div>
  </nav>

  <div class="profile-header">
    <div class="profile-photos">
      <div class="profile-logo-wrapper" id="secretTrigger">L</div>
    </div>
    <h1 class="profile-title">Internal Portals</h1>
    <p class="profile-subtitle">Team Directory</p>
  </div>
  
  <div class="content">
    <div class="skeleton-loader" id="loadingState">
      <div class="skeleton-box"></div><div class="skeleton-box"></div><div class="skeleton-box"></div>
    </div>
    <div class="error-msg" id="errorMessage">Failed to load links.<br>Please ensure your Google Sheet sharing is set to "Anyone with the link".</div>
    <div id="linkContainer"></div>
  </div>

  <script>
    // --- 1. MAIN HUB DIRECTORY LOGIC ---
    const sheetId = '1jsSHt87UsJILNZw7AKsLLqym_iZtEF43SAEEzg6gxzc';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    fetch(url)
      .then(res => res.text())
      .then(text => {
        const data = JSON.parse(text.substring(47).slice(0, -2));
        const rows = data.table.rows;
        const container = document.getElementById('linkContainer');
        const loading = document.getElementById('loadingState');
        
        loading.style.display = 'none';
        const categories = {};

        rows.forEach((row) => {
          if (row.c && row.c[1] && row.c[2] && row.c[3]) {
            const type = row.c[1].v ? row.c[1].v.trim() : "Other";
            const name = row.c[2].v ? row.c[2].v.trim() : "";
            const link = row.c[3].v ? row.c[3].v.trim() : "";
            if (name === "Name" || type === "Type" || !name || !link) return;
            if (!categories[type]) categories[type] = [];
            categories[type].push({ name, link });
          }
        });

        const categoryOrder = ["Marketing", "Operation"];
        const sortedCategories = Object.keys(categories).sort((a, b) => {
          let indexA = categoryOrder.indexOf(a), indexB = categoryOrder.indexOf(b);
          return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
        });

        categoryOrder.concat(sortedCategories.filter(c => !categoryOrder.includes(c))).forEach(categoryName => {
          if (!categories[categoryName]) return;
          const section = document.createElement('div');
          section.className = 'category-section';
          section.innerHTML = `<h2 class="category-title">${categoryName}</h2>`;
          categories[categoryName].forEach(item => {
            section.innerHTML += `<a class="link-btn" href="${item.link}" target="_blank"><span>${item.name}</span> <span class="link-arrow">→</span></a>`;
          });
          container.appendChild(section);
        });
      })
      .catch(error => {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorMessage').style.display = 'block';
      });

    // --- 2. SECRET BOBBLEHEAD ARCADE GAME LOGIC ---
    let clickCount = 0;
    const trigger = document.getElementById('secretTrigger');
    const overlay = document.getElementById('gameOverlay');
    const player = document.getElementById('player');
    const obstacle = document.getElementById('obstacle');
    const scoreDisplay = document.getElementById('gameScoreText');
    const gameOverMsg = document.getElementById('gameOverMsg');
    const entitiesContainer = document.getElementById('entitiesContainer');
    
    let isJumping = false;
    let isGameOver = false;
    let score = 0;
    let gameLoopId, obstacleSpawnId, collectibleSpawnId, scoreInterval;
    
    // The menu items falling!
    const collectibles = ['🍰', '🍝', '🍮', '☕', '🍷']; 

    trigger.addEventListener('click', () => {
      clickCount++;
      if(clickCount >= 5) {
        overlay.style.display = 'flex';
        startGame();
        clickCount = 0;
      }
      setTimeout(() => { clickCount = 0; }, 2000); 
    });

    function closeGame() {
      overlay.style.display = 'none';
      stopGameLoops();
    }

    // Input Listeners
    overlay.addEventListener('touchstart', (e) => {
        if(e.target.className !== 'close-game-btn') {
            e.preventDefault(); 
            jump();
        }
    });
    window.addEventListener('keydown', (e) => {
      if ((e.code === 'Space' || e.code === 'ArrowUp') && overlay.style.display === 'flex') {
        e.preventDefault();
        jump();
      }
    });

    function jump() {
      if (isGameOver) {
        startGame();
        return;
      }
      if (!isJumping) {
        isJumping = true;
        player.classList.add("jump");
        setTimeout(() => {
          player.classList.remove("jump");
          isJumping = false;
        }, 600); 
      }
    }

    function startGame() {
      // Reset State
      isGameOver = false;
      score = 0;
      scoreDisplay.innerText = 0;
      gameOverMsg.style.display = 'none';
      obstacle.classList.add("slide");
      entitiesContainer.innerHTML = ''; // Clear items

      stopGameLoops();
      
      // Basic Score Loop (Dino-style constant score tick)
      scoreInterval = setInterval(() => {
        score++;
        scoreDisplay.innerText = score;
      }, 100);

      // --- ADVANCED ELEMENT SPYING ---
      // We are dynamically spawning obstacles AND collectibles at different times
      // for a "more interesting" feel than a simple loop.

      // Obstacle Spawner (Jeriko)
      function scheduleObstacle() {
          if (isGameOver) return;
          // Spawn every 1.2 to 2.5 seconds
          obstacleSpawnId = setTimeout(() => {
              if (isGameOver) return;
              spawnObstacle();
              scheduleObstacle();
          }, Math.random() * 1300 + 1200);
      }
      scheduleObstacle();

      // Collectible Spawner (Food Items)
      function scheduleCollectible() {
          if (isGameOver) return;
          // Spawn every 2 to 4 seconds
          collectibleSpawnId = setTimeout(() => {
              if (isGameOver) return;
              spawnCollectible();
              scheduleCollectible();
          }, Math.random() * 2000 + 2000);
      }
      scheduleCollectible();
      
      // Main Game Loop for Movement & Collision Detection
      gameLoopId = setInterval(gameTick, 10);
    }

    function spawnObstacle() {
        // Here we can randomize the actual obstacle type if needed, but
        // for "Executive Edition", Jeriko is always the obstacle. We
        // can vary his speed or height instead for randomness.
        // For simplicity, we keep him Dino-style, sliding at a constant
        // height but randomized timing.
        // We ensure only one is on screen at once to prevent overlap.
        const currentObstacles = document.querySelectorAll('.obstacle-active');
        if (currentObstacles.length > 0) return;

        obstacle.style.display = 'flex';
        obstacle.classList.add("slide", "obstacle-active");
        
        // Remove after animation completes (1.2s)
        setTimeout(() => {
            obstacle.classList.remove("slide", "obstacle-active");
            obstacle.style.display = 'none';
        }, 1200); 
    }

    function spawnCollectible() {
        const item = document.createElement('div');
        item.className = 'collectible slide-collect';
        
        // Randomize the item
        item.innerText = collectibles[Math.floor(Math.random() * collectibles.length)];
        
        // Randomize height (must JUMP to catch)
        item.style.bottom = (Math.random() * 50 + 70) + 'px'; // Float 70-120px in air
        
        entitiesContainer.appendChild(item);
        
        // Remove after animation completes (1s)
        setTimeout(() => {
            if (entitiesContainer.contains(item)) item.remove();
        }, 1000);
    }

    function showPopup(points, left) {
        const popup = document.createElement('div');
        popup.className = 'points-popup';
        popup.innerText = '+' + points;
        popup.style.left = left + 'px';
        popup.style.bottom = (Math.random() * 20 + 90) + 'px'; // Randomly above collision
        entitiesContainer.appendChild(popup);
        setTimeout(() => popup.remove(), 600);
    }

    function gameTick() {
      if (isGameOver) return;

      // Get current positions
      let pRect = player.getBoundingClientRect();
      
      // Collision with Obstacle (Jeriko)
      if (obstacle.style.display !== 'none') {
        let oRect = obstacle.getBoundingClientRect();
        let hitMargin = 15; // Hitbox margin

        if (
            pRect.right - hitMargin > oRect.left &&
            pRect.left + hitMargin < oRect.right &&
            pRect.bottom > oRect.top + hitMargin
        ) {
            triggerGameOver();
        }
      }
      
      // Collision with Collectibles (Catch the Bonus!)
      const activeCollectibles = document.querySelectorAll('.collectible');
      activeCollectibles.forEach(item => {
        let iRect = item.getBoundingClientRect();
        
        if (
            pRect.right > iRect.left &&
            pRect.left < iRect.right &&
            pRect.bottom > iRect.top &&
            pRect.top < iRect.bottom
        ) {
            // caught it!
            score += 250;
            scoreDisplay.innerText = score;
            item.remove();
            
            // Show popup points above collision
            showPopup(250, iRect.left);
        }
      });
    }

    function triggerGameOver() {
      isGameOver = true;
      stopGameLoops();
      
      // Stop the slide right where it hit the player
      let currentObstaclePosition = window.getComputedStyle(obstacle).getPropertyValue("right");
      obstacle.classList.remove("slide");
      obstacle.style.right = currentObstaclePosition;

      gameOverMsg.style.display = 'block';
    }

    function stopGameLoops() {
      clearInterval(gameLoopId);
      clearInterval(scoreInterval);
      clearTimeout(obstacleSpawnId);
      clearTimeout(collectibleSpawnId);
      
      // Clear dynamic entities
      entitiesContainer.innerHTML = '';
      
      // Hide the obstacle slide
      obstacle.classList.remove("slide", "obstacle-active");
      obstacle.style.display = 'none';
    }
  </script>
</body>
</html>
