<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LOVA — Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a1f2e; --navy-soft: #2d3447; --canvas: #f7f5f0; --surface: #ffffff;
      --border: #e4e1db; --text: #1a1f2e; --text-2: #5a5750; --text-3: #9a9690; --accent: #c0392b;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; background: var(--canvas); min-height: 100vh; padding-bottom: 60px; overflow-x: hidden; }
    
    /* Top Nav */
    .top-nav { background: var(--navy); padding: 13px 16px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(26,31,46,0.15); }
    .nav-wordmark { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 2px; text-transform: uppercase; }

    /* Profile Header Section */
    .profile-header { display: flex; flex-direction: column; align-items: center; padding: 45px 20px 30px; text-align: center; }
    
    /* Easter Egg Logo Trigger */
    .profile-logo-wrapper { display: flex; align-items: center; justify-content: center; width: 84px; height: 84px; background: var(--navy); border-radius: 50%; color: #fff; font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 700; box-shadow: 0 8px 24px rgba(26,31,46,0.12); cursor: pointer; user-select: none; transition: transform 0.1s; margin-bottom: 18px; }
    .profile-logo-wrapper:active { transform: scale(0.9); background: var(--accent); }

    .profile-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; margin-bottom: 4px; }
    .profile-subtitle { font-size: 13px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 2px; }

    /* Content & Links */
    .content { padding: 0 20px; max-width: 540px; margin: 0 auto; width: 100%; position: relative; z-index: 10; }
    .category-section { margin-bottom: 32px; }
    .category-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--navy); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 16px; letter-spacing: 0.5px; }

    .link-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-bottom: 14px; text-decoration: none; color: var(--text); font-weight: 600; font-size: 15px; box-shadow: 0 2px 8px rgba(26,31,46,0.03); position: relative; overflow: hidden; transition: all 0.3s ease; }
    .link-btn::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--navy); transform: scaleY(0); transform-origin: bottom; transition: transform 0.3s ease; }
    
    @media (hover: hover) {
      .link-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(26, 31, 46, 0.08); border-color: var(--navy-soft); }
      .link-btn:hover::before { transform: scaleY(1); }
      .link-btn:hover .link-arrow { transform: translateX(6px); color: var(--navy); }
    }
    .link-arrow { color: var(--border); font-size: 18px; transition: all 0.3s ease; }
    .error-msg { text-align: center; color: var(--accent); font-size: 13px; font-weight: 500; background: #fdf0ef; padding: 16px; border-radius: 10px; border: 1px solid #f5c6c2; display: none; margin-top: 20px; }

    /* --- SECRET BOBBLEHEAD ARCADE GAME CSS --- */
    #gameOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(26, 31, 46, 0.98); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; touch-action: none; }
    
    .game-header { color: #fff; text-align: center; margin-bottom: 20px; }
    .game-header h2 { font-family: 'Playfair Display', serif; font-size: 28px; letter-spacing: 1px; margin-bottom: 5px; color: #fcd34d; text-transform: uppercase; }
    .game-header p { font-size: 14px; color: #cbd5e1; }
    
    /* Clean, background-less canvas */
    #gameCanvas { width: 95%; max-width: 600px; height: 260px; background: var(--canvas); border-radius: 16px; position: relative; overflow: hidden; border-bottom: 6px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 4px solid var(--navy); }
    
    /* Scrolling Floor Effect */
    .scrolling-floor { position: absolute; bottom: 0; left: 0; width: 200%; height: 25px; background: repeating-linear-gradient( 45deg, var(--navy), var(--navy) 20px, var(--navy-soft) 20px, var(--navy-soft) 40px ); animation: scrollFloor 0.8s linear infinite; z-index: 1; }
    @keyframes scrollFloor { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* --- BOBBLEHEAD CHARACTERS --- */
    .character { position: absolute; bottom: 25px; display: flex; flex-direction: column; align-items: center; z-index: 10; }
    
    /* Lucas (Player) */
    #player { left: 10%; }
    .bobble-head-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 3px solid var(--navy); z-index: 3; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); animation: headBop 0.4s infinite alternate ease-in-out; }
    .body-lucas { width: 45px; height: 40px; background: var(--navy); border-radius: 15px 15px 0 0; margin-top: -10px; z-index: 2; position: relative; display: flex; justify-content: center; box-shadow: inset 0 -5px 10px rgba(0,0,0,0.3); }
    .body-lucas::after { content: ''; width: 8px; height: 25px; background: var(--accent); margin-top: 5px; border-radius: 0 0 5px 5px; clip-path: polygon(0 0, 100% 0, 50% 100%); }

    @keyframes headBop { from { transform: translateY(0); } to { transform: translateY(4px); } }

    /* Jeriko (Obstacle) */
    .hat-jeriko { width: 34px; height: 24px; background: #fff; border-radius: 6px 6px 0 0; border: 2px solid var(--border); margin-bottom: -6px; z-index: 4; position: relative; }
    .body-jeriko { width: 48px; height: 40px; background: #fff; border-radius: 15px 15px 0 0; border: 2px solid var(--border); margin-top: -10px; z-index: 2; position: relative; box-shadow: inset 0 -5px 10px rgba(0,0,0,0.1); }
    .obstacle { z-index: 5; }
    .obstacle .bobble-head-img { border-color: var(--accent); animation: none; }
    .fire-trail { position: absolute; bottom: 0px; right: -25px; font-size: 36px; z-index: 6; animation: flicker 0.3s infinite alternate; }
    @keyframes flicker { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.2); opacity: 1; } }

    /* Jump Physics */
    .jump { animation: jumpArc 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    @keyframes jumpArc { 
      0% { bottom: 25px; transform: rotate(0deg); } 
      40% { bottom: 150px; transform: rotate(15deg); } 
      50% { bottom: 160px; transform: rotate(0deg); } 
      60% { bottom: 150px; transform: rotate(-10deg); } 
      100% { bottom: 25px; transform: rotate(0deg); } 
    }

    /* Collectibles */
    .collectible { position: absolute; font-size: 38px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); z-index: 8; animation: floatItem 1s ease-in-out infinite alternate; }
    @keyframes floatItem { from { transform: translateY(-5px); } to { transform: translateY(5px); } }

    /* UI & Game Over */
    #gameScore { color: #fff; font-size: 24px; font-weight: 700; margin-top: 20px; font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 2px; }
    .points-popup { position: absolute; color: #fcd34d; font-weight: 800; font-size: 28px; pointer-events: none; animation: popUpPoints 0.6s forwards; z-index: 20; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    @keyframes popUpPoints { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-40px) scale(1.5); } }

    #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
    #gameOverScreen h3 { color: var(--accent); font-size: 42px; font-family: 'Playfair Display', serif; margin-bottom: 5px; text-transform: uppercase; }
    #gameOverScreen p { color: var(--navy); margin-bottom: 20px; font-size: 18px; font-weight: 700; }
    .restart-btn { background: var(--navy); color: #fff; border: none; padding: 14px 28px; border-radius: 8px; font-size: 18px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: transform 0.1s; }
    .restart-btn:active { transform: scale(0.95); }
    .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
  
  <div id="gameOverlay">
    <button class="close-btn" onclick="closeGame()">Exit Game</button>
    <div class="game-header">
      <h2>LOVA Rush</h2>
      <p>Tap to jump! Catch food, dodge Chef.</p>
    </div>
    
    <div id="gameCanvas">
      <div class="scrolling-floor" id="floor"></div>
      
      <div id="player" class="character">
        <img src="./Lucas.png" class="bobble-head-img" onerror="this.src='https://ui-avatars.com/api/?name=Lucas&background=1a1f2e&color=fff&size=100'">
        <div class="body-lucas"></div>
      </div>
      
      <div id="entitiesContainer"></div>
      
      <div id="gameOverScreen">
        <h3>BURNT!</h3>
        <p>Final Score: <span id="finalScoreText">0</span></p>
        <button class="restart-btn" onclick="startGame()">Play Again</button>
      </div>
    </div>
    
    <div id="gameScore">Score: <span id="gameScoreText">00000</span></div>
  </div>

  <nav class="top-nav">
    <div class="nav-wordmark">LOVA</div>
  </nav>

  <div class="profile-header">
    <div class="profile-logo-wrapper" id="secretTrigger">L</div>
    <h1 class="profile-title">Internal Portals</h1>
    <p class="profile-subtitle">Team Directory</p>
  </div>
  
  <div class="content" id="linkContainer">
    <div style="text-align:center; padding: 40px; color: var(--text-3);">Loading directory...</div>
  </div>

  <script>
    // --- 1. HUB DIRECTORY LOGIC ---
    const sheetId = '1jsSHt87UsJILNZw7AKsLLqym_iZtEF43SAEEzg6gxzc';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    fetch(url)
      .then(res => res.text())
      .then(text => {
        const data = JSON.parse(text.substring(47).slice(0, -2));
        const container = document.getElementById('linkContainer');
        container.innerHTML = ''; 
        const categories = {};

        data.table.rows.forEach((row) => {
          if (row.c && row.c[1] && row.c[2] && row.c[3]) {
            const type = row.c[1].v ? row.c[1].v.trim() : "Other";
            const name = row.c[2].v ? row.c[2].v.trim() : "";
            const link = row.c[3].v ? row.c[3].v.trim() : "";
            if (name === "Name" || type === "Type" || !name || !link) return;
            if (!categories[type]) categories[type] = [];
            categories[type].push({ name, link });
          }
        });

        const categoryOrder = ["Marketing", "Operation"];
        const sortedCategories = Object.keys(categories).sort((a, b) => {
          let iA = categoryOrder.indexOf(a), iB = categoryOrder.indexOf(b);
          return (iA === -1 ? 999 : iA) - (iB === -1 ? 999 : iB);
        });

        categoryOrder.concat(sortedCategories.filter(c => !categoryOrder.includes(c))).forEach(categoryName => {
          if (!categories[categoryName]) return;
          const section = document.createElement('div');
          section.className = 'category-section';
          section.innerHTML = `<h2 class="category-title">${categoryName}</h2>`;
          categories[categoryName].forEach(item => {
            section.innerHTML += `<a class="link-btn" href="${item.link}" target="_blank"><span>${item.name}</span> <span class="link-arrow">→</span></a>`;
          });
          container.appendChild(section);
        });
      }).catch(err => {
        document.getElementById('linkContainer').innerHTML = `<div class="error-msg" style="display:block;">Failed to load links. Check sharing settings.</div>`;
      });


    // --- 2. ADVANCED GAME ENGINE LOGIC ---
    let clickCount = 0;
    const trigger = document.getElementById('secretTrigger');
    const overlay = document.getElementById('gameOverlay');
    const player = document.getElementById('player');
    const scoreDisplay = document.getElementById('gameScoreText');
    const finalScoreText = document.getElementById('finalScoreText');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const entitiesContainer = document.getElementById('entitiesContainer');
    const canvas = document.getElementById('gameCanvas');
    
    let isJumping = false;
    let isGameOver = true;
    let score = 0;
    let gameSpeed = 6;
    let frameCount = 0;
    let nextObstacleFrame = 60;
    let nextFoodFrame = 100;
    let animationId;
    
    const collectibles = ['🍰', '🍝', '🍮', '☕', '🍷', '🍕']; 

    // Easter Egg Trigger (5 Clicks)
    trigger.addEventListener('click', () => {
      clickCount++;
      if(clickCount >= 5) {
        overlay.style.display = 'flex';
        startGame();
        clickCount = 0;
      }
      setTimeout(() => { clickCount = 0; }, 2000); 
    });

    function closeGame() {
      overlay.style.display = 'none';
      isGameOver = true;
      cancelAnimationFrame(animationId);
    }

    // Input Listeners
    overlay.addEventListener('touchstart', (e) => {
        if(e.target.tagName !== 'BUTTON') { e.preventDefault(); jump(); }
    }, {passive: false});
    window.addEventListener('keydown', (e) => {
      if ((e.code === 'Space' || e.code === 'ArrowUp') && overlay.style.display === 'flex') {
        e.preventDefault(); jump();
      }
    });

    function jump() {
      if (isGameOver) return;
      if (!isJumping) {
        isJumping = true;
        player.classList.add("jump");
        setTimeout(() => {
          player.classList.remove("jump");
          isJumping = false;
        }, 600); 
      }
    }

    function startGame() {
      isGameOver = false;
      score = 0;
      gameSpeed = 6;
      frameCount = 0;
      nextObstacleFrame = 50;
      nextFoodFrame = 80;
      scoreDisplay.innerText = "00000";
      gameOverScreen.style.display = 'none';
      entitiesContainer.innerHTML = ''; 
      document.getElementById('floor').style.animationDuration = '0.8s';

      cancelAnimationFrame(animationId);
      gameLoop();
    }

    function spawnObstacle() {
        const obs = document.createElement('div');
        obs.className = 'character obstacle entity';
        // Guarantees Jeriko face or fallback avatar!
        obs.innerHTML = `
          <div class="jeriko-hat"></div>
          <img src="./Jeriko.png" class="bobble-head-img" style="border-color: var(--accent);" onerror="this.src='https://ui-avatars.com/api/?name=Chef&background=c0392b&color=fff&size=100'">
          <div class="body-jeriko"></div>
          <div class="fire-trail">🔥</div>
        `;
        obs.style.left = canvas.offsetWidth + 'px';
        entitiesContainer.appendChild(obs);
    }

    function spawnFood() {
        const item = document.createElement('div');
        item.className = 'collectible entity';
        item.innerText = collectibles[Math.floor(Math.random() * collectibles.length)];
        item.style.bottom = (Math.random() * 50 + 90) + 'px'; 
        item.style.left = canvas.offsetWidth + 'px';
        entitiesContainer.appendChild(item);
    }

    function showPopup(points, left, bottom) {
        const popup = document.createElement('div');
        popup.className = 'points-popup';
        popup.innerText = '+' + points;
        popup.style.left = left + 'px';
        popup.style.bottom = bottom + 'px';
        entitiesContainer.appendChild(popup);
        setTimeout(() => popup.remove(), 600);
    }

    // Professional RequestAnimationFrame Engine
    function gameLoop() {
      if (isGameOver) return;
      
      frameCount++;
      score++;
      
      // Update score display less frequently for performance
      if (frameCount % 5 === 0) {
          scoreDisplay.innerText = score.toString().padStart(5, '0');
      }
      
      // Speed up game gradually
      gameSpeed = 6 + Math.floor(score / 800);

      // Spawning Logic
      if (frameCount >= nextObstacleFrame) {
          spawnObstacle();
          // Randomize next spawn (farther apart as speed increases to keep it fair)
          nextObstacleFrame = frameCount + Math.floor(Math.random() * 60) + 70 + (gameSpeed * 2);
      }
      
      if (frameCount >= nextFoodFrame) {
          spawnFood();
          nextFoodFrame = frameCount + Math.floor(Math.random() * 80) + 60;
      }

      // Movement & Collision
      let pRect = player.getBoundingClientRect();
      const entities = document.querySelectorAll('.entity');
      
      entities.forEach(ent => {
        let currentLeft = parseFloat(ent.style.left);
        currentLeft -= gameSpeed;
        ent.style.left = currentLeft + 'px';
        
        // Despawn off-screen
        if (currentLeft < -80) {
          ent.remove();
          return;
        }

        // Collision Hitboxes
        let eRect = ent.getBoundingClientRect();
        let shrink = 20; // Forgives near-misses
        
        if (
            pRect.right - shrink > eRect.left &&
            pRect.left + shrink < eRect.right &&
            pRect.bottom > eRect.top + shrink &&
            pRect.top + shrink < eRect.bottom
        ) {
            if (ent.classList.contains('obstacle')) {
                triggerGameOver();
            } else if (ent.classList.contains('collectible')) {
                score += 300; // Big bonus!
                showPopup(300, currentLeft, parseInt(ent.style.bottom) + 20);
                ent.remove();
            }
        }
      });

      animationId = requestAnimationFrame(gameLoop);
    }

    function triggerGameOver() {
      isGameOver = true;
      cancelAnimationFrame(animationId);
      document.getElementById('floor').style.animationDuration = '0s';
      finalScoreText.innerText = score;
      gameOverScreen.style.display = 'flex';
    }
  </script>
</body>
</html>
