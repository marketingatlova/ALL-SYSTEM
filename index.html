<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LOVA — Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a1f2e; --navy-soft: #2d3447; --canvas: #f7f5f0; --surface: #ffffff;
      --border: #e4e1db; --text: #1a1f2e; --text-2: #5a5750; --text-3: #9a9690; --accent: #c0392b;
      --rainbow: transparent;
    }
    .dark-mode {
      --canvas: #12151e; --surface: #1a1f2e; --text: #f7f5f0; --text-2: #ede9e3; --border: #2d3447;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { 
        font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; 
        background: var(--rainbow, var(--canvas)); 
        min-height: 100vh; 
        padding-bottom: 80px; 
        transition: background 0.5s ease, transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }
    
    /* Extreme Rainbow Egg Background */
    .rainbow-bg {
        background: linear-gradient(124deg, #ff2400, #e81d1d, #e8b71d, #1de840, #1ddde8, #2b1de8, #dd00f3, #dd00f3);
        background-size: 1800% 1800%;
        animation: rainbowAnim 8s ease infinite;
    }
    @keyframes rainbowAnim { 0%{background-position:0% 82%} 50%{background-position:100% 19%} 100%{background-position:0% 82%} }

    .top-nav { background: var(--navy); padding: 13px 16px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(26,31,46,0.15); }
    .nav-wordmark { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }

    .profile-header { display: flex; flex-direction: column; align-items: center; padding: 45px 20px 30px; text-align: center; transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
    .profile-logo-wrapper { display: flex; align-items: center; justify-content: center; width: 84px; height: 84px; background: var(--navy); border-radius: 50%; color: #fff; font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 700; box-shadow: 0 8px 24px rgba(26,31,46,0.12); cursor: pointer; user-select: none; transition: transform 0.1s; margin-bottom: 18px; }

    .profile-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; margin-bottom: 4px; cursor: pointer; user-select: none; }
    .profile-subtitle { font-size: 13px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }

    .content { padding: 0 20px; max-width: 540px; margin: 0 auto; width: 100%; transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
    .category-section { margin-bottom: 32px; }
    .category-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--navy); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 16px; letter-spacing: 0.5px; }

    .link-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-bottom: 14px; text-decoration: none; color: var(--text); font-weight: 600; font-size: 15px; box-shadow: 0 2px 8px rgba(26,31,46,0.03); position: relative; overflow: hidden; transition: all 0.3s ease; }
    .link-btn::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--navy); transform: scaleY(0); transform-origin: bottom; transition: transform 0.3s ease; }
    .link-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(26, 31, 46, 0.08); }
    
    .link-btn.sparkle { animation: sparkleGold 1s infinite alternate; background: #ffd700 !important; color: #1a1f2e !important; }
    .pulse { animation: linkPulse 0.5s infinite alternate; }
    @keyframes linkPulse { from { transform: scale(1); } to { transform: scale(1.1); } }
    @keyframes sparkleGold { from { box-shadow: 0 0 5px #ffd700; } to { box-shadow: 0 0 30px #ffd700; } }

    .secret-btn-container { text-align: center; margin-top: 50px; padding-bottom: 40px; }
    .secret-btn { background: transparent; color: var(--accent); border: 2px dashed var(--accent); padding: 12px 30px; border-radius: 30px; font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.1s ease; opacity: 0.5; position: relative; z-index: 10; }

    .food-burst { position: fixed; font-size: 30px; pointer-events: none; z-index: 9999; animation: floatUpAndFade 2s ease-out forwards; }
    @keyframes floatUpAndFade { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-300px) scale(1.5); opacity: 0; } }
    
    .fall-away { transform: translateY(120vh) rotate(10deg) !important; }
    .shake { animation: extremeShake 0.1s infinite; }
    @keyframes extremeShake { 0% { transform: translate(2px, 1px) rotate(0deg); } 50% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(3px, 2px) rotate(1deg); } }

    /* OVERLAY STYLES */
    .boss-game-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(26, 31, 46, 0.95); z-index: 10000; display: none;
      align-items: center; justify-content: center; animation: fadeIn 0.5s ease;
    }
    .boss-game-overlay.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .boss-game-container {
      background: var(--surface); border-radius: 20px; padding: 30px 25px;
      max-width: 450px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); max-height: 90vh; overflow-y: auto;
    }
    @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .boss-game-title {
      font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700;
      color: var(--navy); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px;
    }
    .boss-game-subtitle { font-size: 13px; color: var(--text-3); margin-bottom: 10px; }
    
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--canvas); padding: 10px 15px; border-radius: 8px; margin-bottom: 15px;
    }
    .boss-game-score { font-size: 16px; font-weight: 700; color: var(--navy); }
    .jeriko-strikes { font-size: 14px; font-weight: 600; color: var(--accent); }
    .star-power-text { font-size: 14px; font-weight: 700; color: #f1c40f; display: none; animation: pulse 0.5s infinite alternate; }

    .boss-game-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .boss-game-btn {
      padding: 10px 25px; border: none; border-radius: 10px; font-weight: 600;
      font-size: 13px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
    }
    .boss-game-btn.primary { background: var(--navy); color: white; }
    .boss-game-btn.primary:hover { background: var(--navy-soft); transform: translateY(-2px); }
    .boss-game-btn.secondary { background: var(--canvas); color: var(--navy); border: 2px solid var(--border); }
    .boss-game-btn.secondary:hover { border-color: var(--navy); transform: translateY(-2px); }

    /* BOSS FACE QUIZ SPECIFIC */
    .boss-timer { font-size: 15px; font-weight: 600; color: var(--accent); margin-bottom: 15px; }
    .boss-game-question { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 20px; padding: 15px; background: var(--canvas); border-radius: 12px; border-left: 4px solid var(--accent); }
    .boss-faces-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
    .boss-face-card { aspect-ratio: 1; border-radius: 12px; border: 3px solid var(--border); overflow: hidden; cursor: pointer; transition: all 0.3s ease; background: var(--canvas); }
    .boss-face-card:hover { transform: scale(1.05); border-color: var(--navy); box-shadow: 0 8px 20px rgba(26,31,46,0.2); }
    .boss-face-card.correct { animation: correctPulse 0.5s ease; border-color: #27ae60; box-shadow: 0 0 20px rgba(39, 174, 96, 0.5); }
    .boss-face-card.wrong { animation: wrongShake 0.5s ease; border-color: var(--accent); }
    @keyframes correctPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    @keyframes wrongShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    .boss-face-img { width: 100%; height: 100%; object-fit: cover; }
    .boss-game-result { font-size: 20px; font-weight: 700; margin-bottom: 15px; display: none; padding: 10px; border-radius: 8px; }
    .boss-game-result.show { display: block; }
    .boss-game-result.win { color: #27ae60; background: rgba(39, 174, 96, 0.1); }
    .boss-game-result.lose { color: var(--accent); background: rgba(192, 57, 43, 0.1); }

    /* RUNNER GAME MOBILE CONTROLS */
    .runner-controls { display: flex; justify-content: space-between; margin-top: 15px; user-select: none; }
    .control-btn {
      background: var(--navy-soft); color: white; border: none; border-radius: 12px;
      padding: 15px 25px; font-size: 20px; font-weight: bold; cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: background 0.1s;
    }
    .control-btn:active { background: var(--navy); transform: scale(0.95); }
    .dir-btns { display: flex; gap: 10px; }

  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-wordmark" id="navLogo">LOVA</div>
  </nav>

  <div id="wholePage" style="transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);">
    <div class="profile-header">
      <div class="profile-logo-wrapper" id="logoTrigger">L</div>
      <h1 class="profile-title" id="titleTrigger">Internal Portals</h1>
      <p class="profile-subtitle" id="subtitleTrigger">Team Directory</p>
    </div>
    
    <div class="content" id="linkContainer">
      <div style="text-align:center; padding: 40px; color: var(--text-3);">Connecting...</div>
    </div>

    <div class="secret-btn-container">
      <button class="secret-btn" id="runawayBtn">Do Not Click</button>
    </div>
  </div>

  <div class="boss-game-overlay" id="bossGameOverlay">
    <div class="boss-game-container">
      <div class="boss-game-title">🎯 Boss Challenge</div>
      <div class="boss-game-subtitle">Identify the LOVA leaders!</div>
      <div class="boss-game-score" style="margin-bottom: 15px;">Score: <span id="gameScore">0</span> / <span id="totalRounds">5</span></div>
      <div class="boss-timer" id="gameTimer"></div>
      <div class="boss-game-question" id="gameQuestion">Who is this?</div>
      <div class="boss-faces-grid" id="facesGrid"></div>
      <div class="boss-game-result" id="gameResult"></div>
      <div class="boss-game-buttons">
        <button class="boss-game-btn primary" id="nextRoundBtn" style="display:none;">Next Round</button>
        <button class="boss-game-btn secondary" id="closeGameBtn">Close</button>
      </div>
    </div>
  </div>

  <div class="boss-game-overlay" id="runnerGameOverlay">
    <div class="boss-game-container" style="max-width: 600px;">
      <div class="boss-game-title">👨‍🍳 Service Rush DX</div>
      <div class="boss-game-subtitle">
        <strong>Lucas:</strong> STAR POWER! 🌟<br>
        <strong>Adrien:</strong> +50 Points 💰<br>
        <strong>Jeriko:</strong> Slows you down! ⚠️
      </div>
      
      <div class="status-bar">
        <div class="boss-game-score">Score: <span id="runnerScore">0</span></div>
        <div class="star-power-text" id="starPowerText">🌟 SUPER POWER! 🌟</div>
        <div class="jeriko-strikes" id="jerikoStatus">Jeriko Strikes: 0/3</div>
      </div>
      
      <canvas id="runnerCanvas" width="500" height="250" style="background: #eef2f5; border-radius: 12px; border: 3px solid var(--navy); width: 100%; touch-action: none; display: block; margin: 0 auto;"></canvas>
      
      <div class="runner-controls" id="runnerControls">
        <div class="dir-btns">
          <button class="control-btn" id="btnLeft">←</button>
          <button class="control-btn" id="btnRight">→</button>
        </div>
        <button class="control-btn" id="btnJump" style="padding: 15px 40px;">JUMP</button>
      </div>

      <div class="boss-game-buttons" style="margin-top: 20px;">
        <button class="boss-game-btn primary" id="startRunnerBtn">Start Service</button>
        <button class="boss-game-btn secondary" id="closeRunnerBtn">Close Game</button>
      </div>
    </div>
  </div>

  <script>
    // --- DATA FETCH (Unchanged) ---
    const sheetId = '1jsSHt87UsJILNZw7AKsLLqym_iZtEF43SAEEzg6gxzc';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    fetch(url).then(res => res.text()).then(text => {
      const data = JSON.parse(text.substring(47).slice(0, -2));
      const container = document.getElementById('linkContainer');
      container.innerHTML = ''; 
      const categories = {};
      data.table.rows.forEach((row) => {
        if (row.c && row.c[1] && row.c[2] && row.c[3]) {
          const type = row.c[1].v?.trim() || "Other";
          const name = row.c[2].v?.trim() || "";
          const link = row.c[3].v?.trim() || "";
          if (name === "Name" || !name || !link) return;
          if (!categories[type]) categories[type] = [];
          categories[type].push({ name, link });
        }
      });
      ["Marketing", "Operation"].concat(Object.keys(categories).filter(c => c !== "Marketing" && c !== "Operation")).forEach(cat => {
        if (!categories[cat]) return;
        const sec = document.createElement('div');
        sec.className = 'category-section';
        sec.innerHTML = `<h2 class="category-title">${cat}</h2>`;
        categories[cat].forEach(item => {
          const a = document.createElement('a');
          a.className = 'link-btn'; a.href = item.link; a.target = '_blank';
          a.innerHTML = `<span>${item.name}</span> <span class="link-arrow">→</span>`;
          let timer;
          a.onmouseenter = () => timer = setTimeout(() => a.classList.add('sparkle'), 5000);
          a.onmouseleave = () => { clearTimeout(timer); a.classList.remove('sparkle'); };
          sec.appendChild(a);
        });
        container.appendChild(sec);
      });
    });

    // --- BOSS FACE QUIZ GAME (UPDATED WITH NEW IMAGES) ---
    const bosses = [
      { name: 'Lucas', title: 'CEO', image: 'Lucas_g.png' },
      { name: 'Jeriko', title: 'Head Chef', image: 'Jeriko_g.png' },
      { name: 'Adrien', title: 'Dir. of Ops', image: 'Adrien_g.png' }
    ];

    let gameScore = 0; let currentRound = 0; let totalRounds = 5;
    let currentBoss = null; let gameTimer = null; let timeLeft = 10;

    function startBossGame() {
      document.getElementById('bossGameOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
      gameScore = 0; currentRound = 0;
      document.getElementById('gameScore').textContent = gameScore;
      document.getElementById('totalRounds').textContent = totalRounds;
      nextRound();
    }

    function nextRound() {
      currentRound++;
      if (currentRound > totalRounds) return endGame();

      document.getElementById('gameResult').classList.remove('show', 'win', 'lose');
      document.getElementById('nextRoundBtn').style.display = 'none';
      document.getElementById('facesGrid').style.pointerEvents = 'auto';
      
      currentBoss = bosses[Math.floor(Math.random() * bosses.length)];
      const allCards = [...bosses, ...bosses].sort(() => Math.random() - 0.5).slice(0,6);
      // Ensure current boss is in the grid at least once
      if(!allCards.find(b => b.name === currentBoss.name)) allCards[0] = currentBoss;
      allCards.sort(() => Math.random() - 0.5);
      
      const grid = document.getElementById('facesGrid');
      grid.innerHTML = '';
      allCards.forEach((boss) => {
        const card = document.createElement('div');
        card.className = 'boss-face-card';
        card.innerHTML = `<img src="${boss.image}" alt="${boss.name}" class="boss-face-img">`;
        card.onclick = () => selectBoss(boss, card);
        grid.appendChild(card);
      });

      document.getElementById('gameQuestion').textContent = `Find ${currentBoss.name} (${currentBoss.title})`;
      timeLeft = 10; updateTimer();
      clearInterval(gameTimer);
      gameTimer = setInterval(() => {
        timeLeft--; updateTimer();
        if (timeLeft <= 0) { clearInterval(gameTimer); wrongAnswer(); }
      }, 1000);
    }

    function updateTimer() {
      const timerEl = document.getElementById('gameTimer');
      timerEl.textContent = `⏱️ Time: ${timeLeft}s`;
      timerEl.style.color = timeLeft <= 3 ? 'var(--accent)' : 'var(--text-2)';
    }

    function selectBoss(selectedBoss, card) {
      clearInterval(gameTimer);
      document.getElementById('facesGrid').style.pointerEvents = 'none';
      if (selectedBoss.name === currentBoss.name) {
        card.classList.add('correct'); gameScore++;
        document.getElementById('gameScore').textContent = gameScore;
        showResult(true);
      } else {
        card.classList.add('wrong');
        document.querySelectorAll('.boss-face-card').forEach(c => {
          if (c.querySelector('img').alt === currentBoss.name) c.classList.add('correct');
        });
        showResult(false);
      }
    }

    function wrongAnswer() {
      document.getElementById('facesGrid').style.pointerEvents = 'none';
      document.querySelectorAll('.boss-face-card').forEach(c => {
        if (c.querySelector('img').alt === currentBoss.name) c.classList.add('correct');
      });
      showResult(false);
    }

    function showResult(isCorrect) {
      const resultEl = document.getElementById('gameResult');
      resultEl.classList.add('show');
      if (isCorrect) {
        resultEl.textContent = '✅ Correct!'; resultEl.classList.add('win');
      } else {
        resultEl.textContent = `❌ It was ${currentBoss.name}!`; resultEl.classList.add('lose');
      }
      if (currentRound < totalRounds) document.getElementById('nextRoundBtn').style.display = 'inline-block';
      else setTimeout(endGame, 1500);
    }

    function endGame() {
      const resultEl = document.getElementById('gameResult');
      const percentage = Math.round((gameScore / totalRounds) * 100);
      let message = percentage === 100 ? '🏆 PERFECT!' : percentage >= 80 ? '🌟 Great job!' : percentage >= 60 ? '👍 Not bad!' : '😅 Meet the team!';
      
      document.getElementById('gameQuestion').textContent = message;
      resultEl.textContent = `Final Score: ${gameScore} / ${totalRounds}`;
      resultEl.classList.remove('lose'); resultEl.classList.add('show', 'win');
      document.getElementById('facesGrid').innerHTML = '';
      document.getElementById('nextRoundBtn').style.display = 'none';
      document.getElementById('gameTimer').textContent = '';
    }

    document.getElementById('nextRoundBtn').onclick = nextRound;
    document.getElementById('closeGameBtn').onclick = () => {
      clearInterval(gameTimer);
      document.getElementById('bossGameOverlay').classList.remove('active');
      document.body.style.overflow = '';
    };

    // --- PROPER PLATFORMER RUNNER GAME (MARIO STYLE DX) ---
    const runnerOverlay = document.getElementById('runnerGameOverlay');
    const runnerCanvas = document.getElementById('runnerCanvas');
    const ctx = runnerCanvas.getContext('2d');
    
    // Load Boss Images
    const imgLucas = new Image(); imgLucas.src = 'Lucas_g.png';
    const imgJeriko = new Image(); imgJeriko.src = 'Jeriko_g.png';
    const imgAdrien = new Image(); imgAdrien.src = 'Adrien_g.png';

    let runnerAnimId;
    let isRunning = false;
    let rScore = 0;
    let rFrameCount = 0;
    let groundScroll = 0;
    
    // Powerups & Debuffs State
    let superPowerTimer = 0;
    let jerikoStrikes = 0;
    
    // Input state
    const keys = { left: false, right: false, jump: false };

    // Player Object
    const chef = { 
      x: 50, y: 150, width: 30, height: 30, 
      vx: 0, vy: 0, maxSpeed: 6, jumpPower: -11, gravity: 0.6, friction: 0.8,
      isGrounded: false, emoji: '👨‍🍳' 
    };
    
    let entities = []; 

    // Keyboard Listeners
    window.addEventListener('keydown', (e) => {
      if(!isRunning) return;
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
      if (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') keys.jump = true;
      if (['ArrowUp', 'Space', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
    }, { passive: false });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
      if (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') keys.jump = false;
    });

    // Mobile On-Screen Button Listeners
    const btnLeft = document.getElementById('btnLeft');
    const btnRight = document.getElementById('btnRight');
    const btnJump = document.getElementById('btnJump');

    const addTouch = (elem, key) => {
      elem.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
      elem.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
      elem.addEventListener('mousedown', (e) => { e.preventDefault(); keys[key] = true; });
      elem.addEventListener('mouseup', (e) => { e.preventDefault(); keys[key] = false; });
      elem.addEventListener('mouseleave', (e) => { e.preventDefault(); keys[key] = false; });
    };
    addTouch(btnLeft, 'left'); addTouch(btnRight, 'right'); addTouch(btnJump, 'jump');

    function updateStatusUI() {
      document.getElementById('runnerScore').textContent = rScore;
      document.getElementById('jerikoStatus').textContent = `Jeriko Strikes: ${jerikoStrikes}/3`;
      if(jerikoStrikes >= 2) document.getElementById('jerikoStatus').style.color = 'red';
      else document.getElementById('jerikoStatus').style.color = 'var(--accent)';
      
      document.getElementById('starPowerText').style.display = superPowerTimer > 0 ? 'block' : 'none';
    }

    function resetRunner() {
      chef.x = 50; chef.y = 150; chef.vx = 0; chef.vy = 0; chef.isGrounded = false;
      chef.maxSpeed = 6;
      entities = []; rScore = 0; rFrameCount = 0; groundScroll = 0;
      superPowerTimer = 0; jerikoStrikes = 0;
      updateStatusUI();
      ctx.clearRect(0, 0, runnerCanvas.width, runnerCanvas.height);
    }

    function runnerLoop() {
      if (!isRunning) return;
      ctx.clearRect(0, 0, runnerCanvas.width, runnerCanvas.height);

      // Super Power Timer Logic
      if (superPowerTimer > 0) {
        superPowerTimer--;
        if (superPowerTimer === 0) updateStatusUI(); // turn off text
      }

      // Calculate Game Speed Modifier based on Jeriko Strikes & Super Power
      let currentMaxSpeed = chef.maxSpeed;
      let globalScrollSpeed = 4;
      
      if (superPowerTimer > 0) {
        currentMaxSpeed = 8; // Super fast!
        globalScrollSpeed = 6;
      } else if (jerikoStrikes === 1) {
        currentMaxSpeed = 4; // Slowed
        globalScrollSpeed = 3;
      } else if (jerikoStrikes >= 2) {
        currentMaxSpeed = 2.5; // Very Slowed
        globalScrollSpeed = 2;
      }

      // --- PHYSICS & MOVEMENT ---
      if (keys.left) chef.vx -= 1;
      if (keys.right) chef.vx += 1;
      
      chef.vx *= chef.friction; 
      
      if (chef.vx > currentMaxSpeed) chef.vx = currentMaxSpeed;
      if (chef.vx < -currentMaxSpeed) chef.vx = -currentMaxSpeed;
      
      if (keys.jump && chef.isGrounded) {
        chef.vy = chef.jumpPower;
        chef.isGrounded = false;
      }

      chef.vy += chef.gravity;
      chef.x += chef.vx;
      chef.y += chef.vy;

      // Floor Collision
      const floorY = runnerCanvas.height - 40;
      if (chef.y + chef.height >= floorY) {
        chef.y = floorY - chef.height;
        chef.vy = 0;
        chef.isGrounded = true;
      } else {
        chef.isGrounded = false;
      }

      if (chef.x < 0) { chef.x = 0; chef.vx = 0; }
      if (chef.x + chef.width > runnerCanvas.width) { chef.x = runnerCanvas.width - chef.width; chef.vx = 0; }

      // --- DRAW ENVIRONMENT ---
      groundScroll = (groundScroll - globalScrollSpeed) % 40;
      ctx.fillStyle = jerikoStrikes >= 2 ? '#b2bec3' : '#d1d8e0'; // Darker ground if slowed
      if(superPowerTimer > 0) ctx.fillStyle = '#ffeaa7'; // Golden ground if super
      ctx.fillRect(0, floorY, runnerCanvas.width, 40);
      
      ctx.fillStyle = jerikoStrikes >= 2 ? '#636e72' : '#a5b1c2';
      if(superPowerTimer > 0) ctx.fillStyle = '#fdcb6e';
      for(let i=0; i < runnerCanvas.width + 40; i+=40) {
        ctx.fillRect(i + groundScroll, floorY, 20, 40); 
      }

      // Draw Player
      if (superPowerTimer > 0) {
        // Rainbow Aura
        ctx.shadowBlur = 15;
        ctx.shadowColor = `hsl(${rFrameCount * 5 % 360}, 100%, 50%)`;
      } else if (jerikoStrikes > 0) {
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'red';
      }
      ctx.font = '34px Arial';
      ctx.textAlign = 'left';
      ctx.fillText(chef.emoji, chef.x, chef.y + 28);
      ctx.shadowBlur = 0; // reset shadow

      // --- SPAWN ENTITIES ---
      rFrameCount++;
      // Spawn Hazards
      if (rFrameCount % (Math.max(40, 90 - (rScore/2))) === 0) {
        const hazards = ['🔥', '🔪', '🗑️'];
        entities.push({
          id: 'hazard',
          x: runnerCanvas.width, y: floorY - 30, w: 30, h: 30,
          vx: -(globalScrollSpeed + Math.random()*2), 
          emoji: hazards[Math.floor(Math.random() * hazards.length)]
        });
      }
      
      // Spawn Bosses
      if (rFrameCount % 150 === 0) {
        const rand = Math.random();
        let bossId = 'adrien'; let img = imgAdrien; let stroke = '#3498db';
        
        if (rand < 0.25) { bossId = 'lucas'; img = imgLucas; stroke = 'gold'; } 
        else if (rand < 0.6) { bossId = 'jeriko'; img = imgJeriko; stroke = 'red'; }
        
        entities.push({
          id: bossId, bossObj: img, strokeColor: stroke,
          x: runnerCanvas.width, y: floorY - 130 - Math.random() * 40, 
          w: 40, h: 40, vx: -globalScrollSpeed, offset: Math.random() * 100 
        });
      }

      // --- UPDATE & DRAW ENTITIES ---
      for (let i = entities.length - 1; i >= 0; i--) {
        let e = entities[i];
        e.x += e.vx;

        if(e.id !== 'hazard') e.y += Math.sin((rFrameCount + e.offset) * 0.05) * 1.5;

        // Draw
        if (e.id === 'hazard') {
          ctx.fillText(e.emoji, e.x, e.y + 25);
        } else {
          if(e.bossObj.complete && e.bossObj.naturalHeight !== 0) {
            ctx.drawImage(e.bossObj, e.x, e.y, e.w, e.h);
          } else {
            ctx.fillText('👨‍💼', e.x, e.y + 30);
          }
          ctx.strokeStyle = e.strokeColor; ctx.lineWidth = 3;
          ctx.strokeRect(e.x-2, e.y-2, e.w+4, e.h+4);
        }

        // Collision Hitbox
        const pad = 5; 
        if (chef.x + pad < e.x + e.w && chef.x + chef.width - pad > e.x &&
            chef.y + pad < e.y + e.h && chef.y + chef.height - pad > e.y) {
            
            if (e.id === 'hazard') {
              if (superPowerTimer > 0) {
                // Smash hazard!
                rScore += 10;
                entities.splice(i, 1);
                updateStatusUI();
                continue;
              } else {
                // GAME OVER
                isRunning = false;
                ctx.fillStyle = 'rgba(26, 31, 46, 0.85)';
                ctx.fillRect(0,0,runnerCanvas.width,runnerCanvas.height);
                ctx.fillStyle = 'white'; ctx.font = 'bold 30px Playfair Display'; ctx.textAlign = 'center';
                ctx.fillText('86\'d! Service Over.', runnerCanvas.width/2, runnerCanvas.height/2 - 10);
                ctx.font = '18px Plus Jakarta Sans';
                ctx.fillText(`Final Score: ${rScore}`, runnerCanvas.width/2, runnerCanvas.height/2 + 25);
                
                document.getElementById('startRunnerBtn').style.display = 'inline-block';
                document.getElementById('startRunnerBtn').textContent = 'Try Again';
                return;
              }
            } 
            else if (e.id === 'lucas') {
              superPowerTimer = 300; // 5 seconds at 60fps
              rScore += 100;
              entities.splice(i, 1);
              updateStatusUI();
              continue; 
            }
            else if (e.id === 'adrien') {
              rScore += 50;
              entities.splice(i, 1);
              updateStatusUI();
              continue; 
            }
            else if (e.id === 'jeriko') {
              jerikoStrikes++;
              entities.splice(i, 1);
              updateStatusUI();
              
              if (jerikoStrikes >= 4) { // 4th strike is game over
                isRunning = false;
                ctx.fillStyle = 'rgba(192, 57, 43, 0.9)';
                ctx.fillRect(0,0,runnerCanvas.width,runnerCanvas.height);
                ctx.fillStyle = 'white'; ctx.font = 'bold 30px Playfair Display'; ctx.textAlign = 'center';
                ctx.fillText('FIRED BY JERIKO!', runnerCanvas.width/2, runnerCanvas.height/2 - 10);
                document.getElementById('startRunnerBtn').style.display = 'inline-block';
                document.getElementById('startRunnerBtn').textContent = 'Beg for Job Back';
                return;
              }
              continue;
            }
        }

        // Remove off-screen and add points for surviving hazards
        if (e.x + e.w < 0) {
          if (e.id === 'hazard') {
            rScore += 5;
            updateStatusUI();
          }
          entities.splice(i, 1);
        }
      }

      runnerAnimId = requestAnimationFrame(runnerLoop);
    }

    function startRunnerGame() {
      runnerOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      document.getElementById('startRunnerBtn').style.display = 'none';
      resetRunner();
      isRunning = true;
      runnerLoop();
    }

    document.getElementById('startRunnerBtn').onclick = startRunnerGame;

    document.getElementById('closeRunnerBtn').onclick = () => {
      isRunning = false;
      cancelAnimationFrame(runnerAnimId);
      runnerOverlay.classList.remove('active');
      document.body.style.overflow = '';
      document.getElementById('startRunnerBtn').style.display = 'inline-block';
      document.getElementById('startRunnerBtn').textContent = 'Start Service';
    };

    // --- 10 EXTREME EASTER EGGS + MINIGAMES ---

    // 1. Extreme Gravity Glitch (Nav Logo)
    document.getElementById('navLogo').onclick = () => {
      const page = document.getElementById('wholePage');
      page.classList.add('fall-away');
      setTimeout(() => page.classList.remove('fall-away'), 1500);
    };

    // Keyboard Secrets
    let typed = '';
    window.onkeydown = (e) => {
      typed = (typed + e.key.toLowerCase()).slice(-5);
      if (e.key === 'r' && !isRunning) document.body.classList.toggle('rainbow-bg');
      if (typed.endsWith('lova') && !isRunning) { 
        document.body.style.transform = 'rotate(360deg)'; 
        setTimeout(()=>document.body.style.transform='none', 1000); 
      }
      if (typed.endsWith('big') && !isRunning) {
        document.querySelectorAll('.link-btn').forEach(b => b.classList.toggle('pulse'));
      }
      if (typed.endsWith('shake') && !isRunning) {
        document.body.classList.add('shake');
        setTimeout(() => document.body.classList.remove('shake'), 1000);
      }
      if (typed.endsWith('boss') || typed.endsWith('game')) {
        startBossGame();
      }
      if (typed.endsWith('run')) { 
        startRunnerGame();
      }
    };

    // 3. Extreme Runaway Button
    const btn = document.getElementById('runawayBtn');
    const move = () => {
      btn.style.position = 'fixed';
      btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
      btn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
    };
    btn.addEventListener('mouseover', move);
    btn.onclick = () => { 
      alert("IMPOSSIBLE! 🏆\n\nSecrets unlocked:\n- Type 'boss' to play Boss Challenge!\n- Type 'run' to play Service Rush DX!"); 
      btn.style.position = 'static'; 
    };

    // 4. Food Explosion (Logo 5x)
    let logoCount = 0;
    document.getElementById('logoTrigger').onclick = (e) => {
      if (++logoCount >= 5) {
        for(let i=0; i<25; i++) setTimeout(() => {
          const f = document.createElement('div'); 
          f.className = 'food-burst';
          f.innerText = ['🍕','🍷','🍝','🍰','☕'][Math.floor(Math.random()*5)];
          f.style.left = e.clientX + (Math.random()*200-100) + 'px';
          f.style.top = e.clientY + 'px';
          document.body.appendChild(f);
          setTimeout(() => f.remove(), 2000);
        }, i*40);
        logoCount = 0;
      }
    };

    // 6. The Rush (Title 3x)
    let titleCount = 0;
    document.getElementById('titleTrigger').onclick = function() {
      if (++titleCount >= 3) {
        const orig = this.innerText;
        this.innerText = "SERVICE RUSH!";
        this.style.color = "var(--accent)";
        document.body.classList.add('shake');
        setTimeout(() => { 
            this.innerText = orig; 
            this.style.color = ""; 
            document.body.classList.remove('shake');
        }, 3000);
        titleCount = 0;
      }
    };

    // 7. Night Mode (Subtitle 3x)
    let subCount = 0;
    document.getElementById('subtitleTrigger').onclick = () => {
      if (++subCount >= 3) { 
        document.body.classList.toggle('dark-mode'); 
        subCount = 0; 
      }
    };

  </script>
</body>
</html>
