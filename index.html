<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LOVA — Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#1a1f2e; --navy2:#2d3447; --border:#e4e1db; --text:#1a1f2e; --text-2:#5a5750; --text-3:#9a9690;
      --surface:#ffffff; --canvas:#f7f5f0; --accent:#c0392b;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Plus Jakarta Sans','Sarabun',sans-serif;background:var(--canvas);min-height:100vh;padding-bottom:60px;}
    
    /* Top Nav */
    .top-nav{background:var(--navy);padding:13px 16px;display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(26,31,46,0.15);}
    .nav-wordmark{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:2px;text-transform:uppercase;}

    /* Profile Header Section */
    .profile-header{display:flex;flex-direction:column;align-items:center;padding:45px 20px 30px;text-align:center;}
    
    /* Easter Egg Logo Trigger */
    .profile-logo-wrapper{position:relative;display:flex;align-items:center;justify-content:center;width:84px;height:84px;background:var(--navy);border-radius:50%;color:#fff;font-family:'Playfair Display',serif;font-size:34px;font-weight:700;box-shadow:0 8px 24px rgba(26,31,46,0.12);animation:popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;cursor:pointer;user-select:none;transition:transform 0.1s;}
    .profile-logo-wrapper:active{transform:scale(0.9);}
    
    .profile-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:0.5px;margin-bottom:4px;}
    .profile-subtitle{font-size:13px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:2px;}

    /* Content & Links */
    .content{padding:0 20px;max-width:540px;margin:0 auto;width:100%;}
    
    /* Category Header */
    .category-section{margin-bottom:32px;}
    .category-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--navy);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:16px;letter-spacing:0.5px;}

    /* Standard Interactive Buttons */
    .link-btn{display:flex;justify-content:space-between;align-items:center;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:14px;text-decoration:none;color:var(--text);font-weight:600;font-size:15px;box-shadow:0 2px 8px rgba(26,31,46,0.03);position:relative;overflow:hidden;transition:all 0.3s ease;}
    
    /* Hover Magic Line */
    .link-btn::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--navy);transform:scaleY(0);transform-origin:bottom;transition:transform 0.3s ease;}
    
    /* Hover Interactions */
    @media (hover: hover){
      .link-btn:hover{transform:translateY(-4px);box-shadow:0 10px 20px rgba(26, 31, 46, 0.08);border-color:var(--navy2);}
      .link-btn:hover::before{transform:scaleY(1);}
      .link-btn:hover .link-arrow{transform:translateX(6px);color:var(--navy);}
    }
    .link-arrow{color:var(--border);font-size:18px;transition:all 0.3s ease;}

    /* Animations */
    @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    /* Loading State */
    .error-msg{text-align:center;color:var(--accent);font-size:13px;font-weight:500;background:#fdf0ef;padding:16px;border-radius:10px;border:1px solid #f5c6c2;display:none;margin-top:20px;}

    /* --- SECRET DINO-STYLE GAME OVERLAY --- */
    #gameOverlay{position:fixed;top:0;left:0;width:100%;height:100vh;background:rgba(26, 31, 46, 0.95);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;}
    #gameOverMsg{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);background:#fff;padding:20px;border-radius:12px;text-align:center;color:var(--navy);display:none;z-index:10000;font-weight:700;width:80%;box-shadow:0 4px 15px rgba(0,0,0,0.2);}
    #gameOverMsg p{margin-top:10px;font-size:12px;font-weight:500;color:#555;}

    /* PROPER RUNNER GAME AESTHETIC */
    #gameCanvas{width:90%;max-width:600px;height:200px;background:#fff;border-radius:16px;position:relative;overflow:hidden;border-bottom:6px solid var(--border);box-shadow:0 10px 30px rgba(0,0,0,0.3);}
    #gameScore{color:#fff;font-size:20px;font-weight:700;margin-top:20px;font-family:'Plus Jakarta Sans', sans-serif;}
    
    /* Base64 embedded stylized cartoon characters - Full Body Sprites */
    #player{width:50px;height:75px;position:absolute;bottom:0;left:10%;background-image:url('data:image/png;base64,iVBORw0KGgoAAAANSUh4withLucasFullCartoonBase64Here...'); background-size:contain; background-repeat:no-repeat; background-color:#EEE; z-index:5; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.15);}
    #obstacle{width:60px;height:90px;position:absolute;bottom:0;right:-60px;background-image:url('data:image/png;base64,iVBORw0KGgoAAAANSUh4withJerikoFullChefCartoonBase64Here...'); background-size:contain; background-repeat:no-repeat; background-color:#DDD; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.15);}
    
    /* Jump Animation */
    .jump{animation:jumpAnim 0.5s ease-out;}
    @keyframes jumpAnim { 0% { bottom: 0; } 40% { bottom: 110px; } 50% { bottom: 120px; } 60% { bottom: 110px; } 100% { bottom: 0; } }
    
    /* Obstacle Animation */
    .slide{animation:slideAnim 1.2s infinite linear;}
    @keyframes slideAnim { 0% { right: -60px; } 100% { right: 100%; } }
    
    .loading-game{color:#fff; font-size:14px;}
  </style>
</head>
<body>
  
  <div id="gameOverlay">
    <div id="gameOverMsg">BURNT! <p>Refresh to replay.</p></div>
    <div style="color:#fff; text-align:center; margin-bottom:15px;"><h2 style="font-family:'Playfair Display'; text-transform:uppercase; letter-spacing:1px; color:#F5F5F0;">LOVA RUSH: Executive Edition</h2><p style="font-size:13px; color:#9a9690;">JUMP to escape Jeriko's fiery kitchen chaos.</p></div>
    <div id="gameCanvas">
      <div id="player"></div>
      <div id="obstacle"></div>
    </div>
    <div id="gameScore">Score: <span id="gameScoreText">0</span></div>
    <button style="background:var(--navy); color:#fff; border:none; padding:10px 20px; border-radius:8px; margin-top:20px; font-weight:600; cursor:pointer;" onclick="location.reload()">Back to Work</button>
  </div>

  <nav class="top-nav">
    <div class="nav-wordmark">LOVA</div>
  </nav>

  <div class="profile-header">
    <div class="profile-logo-wrapper" id="secretTrigger">L</div>
    <h1 class="profile-title">Internal Portals</h1>
    <p class="profile-subtitle">Team Directory</p>
  </div>
  
  <div class="content">
    <div class="error-msg" id="errorMessage">Failed to load links.<br>Please ensure your Google Sheet sharing is set to "Anyone with the link".</div>
    <div id="linkContainer">
      <div style="text-align:center; padding: 40px; color: var(--text-3);">Loading directory...</div>
    </div>
  </div>

  <script>
    // --- 1. MAIN HUB DIRECTORY LOGIC ---
    // (Correct Sheet Fetching with categorization logic)
    const sheetId = '1jsSHt87UsJILNZw7AKsLLqym_iZtEF43SAEEzg6gxzc';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    fetch(url)
      .then(res => res.text())
      .then(text => {
        const data = JSON.parse(text.substring(47).slice(0, -2));
        const rows = data.table.rows;
        const container = document.getElementById('linkContainer');
        container.innerHTML = ''; // Clear loading message

        const categories = {};

        rows.forEach((row) => {
          // Columns in shared sheet are No, Type, Name, Link.
          // row.c corresponds to these.
          if (row.c && row.c[1] && row.c[2] && row.c[3]) {
            const type = row.c[1].v ? row.c[1].v.trim() : "Other";
            const name = row.c[2].v ? row.c[2].v.trim() : "";
            const link = row.c[3].v ? row.c[3].v.trim() : "";

            // Basic validation to skip headers or empty rows
            if (name === "Name" || type === "Type" || !name || !link) return;

            if (!categories[type]) {
              categories[type] = [];
            }
            categories[type].push({ name, link });
          }
        });

        // Forced sorting for Marketing and Operation
        const categoryOrder = ["Marketing", "Operation"];
        const sortedCategories = Object.keys(categories).sort((a, b) => {
          let indexA = categoryOrder.indexOf(a);
          let indexB = categoryOrder.indexOf(b);
          // If category isn't in our forced order list, push it to the bottom
          if (indexA === -1) indexA = 999;
          if (indexB === -1) indexB = 999;
          return indexA - indexB;
        });

        sortedCategories.forEach(categoryName => {
          // Create Section Wrapper
          const section = document.createElement('div');
          section.className = 'category-section';

          // Create Header
          const header = document.createElement('h2');
          header.className = 'category-title';
          header.textContent = categoryName;
          section.appendChild(header);
          
          // Create Links for this category
          categories[categoryName].forEach(item => {
            const btn = document.createElement('a');
            btn.className = 'link-btn';
            btn.href = item.link;
            btn.target = '_blank';
            btn.innerHTML = `<span>${item.name}</span> <span class="link-arrow">→</span>`;
            section.appendChild(btn);
          });

          container.appendChild(section);
        });
      })
      .catch(error => {
        console.error('Error fetching data:', error);
        document.getElementById('errorMessage').style.display = 'block';
      });


    // --- 2. SECRET DINO-STYLE GAME LOGIC ---
    let clickCount = 0;
    const trigger = document.getElementById('secretTrigger');
    const overlay = document.getElementById('gameOverlay');
    const player = document.getElementById('player');
    const obstacle = document.getElementById('obstacle');
    const scoreDisplay = document.getElementById('gameScoreText');
    const gameOverMsg = document.getElementById('gameOverMsg');
    
    let isJumping = false;
    let isGameOver = false;
    let score = 0;
    let scoreInterval;
    let collisionInterval;

    // Trigger Game on 5 Logo Clicks
    trigger.addEventListener('click', () => {
      clickCount++;
      if(clickCount >= 5) {
        overlay.style.display = 'flex';
        obstacle.classList.add("slide");
        document.getElementById(' secretTrigger ').style.display = 'none'; // Hide trigger during game
        resetGame();
        clickCount = 0;
      }
      // Reset click count after 2 seconds of inactivity
      setTimeout(() => { clickCount = 0; }, 2000); 
    });

    // Jump Function (Mobile Tap)
    function jump() {
      if(!player.classList.contains("jump") && !isGameOver) {
        player.classList.add("jump");
        setTimeout(function() {
          player.classList.remove("jump");
        }, 500); // Duration must match CSS jump animation
      }
    }

    // Controls
    overlay.addEventListener('touchstart', jump);
    window.addEventListener('keydown', (e) => {
      if(e.code === 'Space' && overlay.style.display === 'flex') {
        e.preventDefault();
        jump();
      }
    });

    // Reset game state
    function resetGame() {
      isGameOver = false;
      score = 0;
      scoreDisplay.innerText = 0;
      gameOverMsg.style.display = 'none';
      player.style.top = "110px"; // Reset player height
      
      // Clear any existing intervals
      if (scoreInterval) clearInterval(scoreInterval);
      if (collisionInterval) clearInterval(collisionInterval);
      
      // Start Game Loops
      scoreInterval = setInterval(function() {
        score++;
        scoreDisplay.innerText = score;
      }, 100);

      // Simple collision detection loop
      collisionInterval = setInterval(function() {
        let playerTop = parseInt(window.getComputedStyle(player).getPropertyValue("top"));
        let obstacleLeft = parseInt(window.getComputedStyle(obstacle).getPropertyValue("left"));

        // Collision logic for the cartoon figures
        if(obstacleLeft < 80 && obstacleLeft > 20 && playerTop >= 110) {
          endGame();
        }
      }, 10);
    }

    // End Game
    function endGame() {
      isGameOver = true;
      obstacle.style.animation = "none";
      obstacle.style.display = "none";
      gameOverMsg.style.display = 'block';
      clearInterval(scoreInterval);
      clearInterval(collisionInterval);
    }
  </script>
</body>
</html>
