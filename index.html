<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LOVA — Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a1f2e; --navy-soft: #2d3447; --canvas: #f7f5f0; --surface: #ffffff;
      --border: #e4e1db; --text: #1a1f2e; --text-2: #5a5750; --text-3: #9a9690; --accent: #c0392b;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; background: var(--canvas); min-height: 100vh; padding-bottom: 80px; overflow-x: hidden; }
    
    /* Top Nav */
    .top-nav { background: var(--navy); padding: 13px 16px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 50; box-shadow: 0 4px 20px rgba(26,31,46,0.15); }
    .nav-wordmark { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 2px; text-transform: uppercase; }

    /* Profile Header Section */
    .profile-header { display: flex; flex-direction: column; align-items: center; padding: 45px 20px 30px; text-align: center; }
    .profile-logo-wrapper { display: flex; align-items: center; justify-content: center; width: 84px; height: 84px; background: var(--navy); border-radius: 50%; color: #fff; font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 700; box-shadow: 0 8px 24px rgba(26,31,46,0.12); margin-bottom: 18px; }
    .profile-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; margin-bottom: 4px; }
    .profile-subtitle { font-size: 13px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 2px; }

    /* Content & Links */
    .content { padding: 0 20px; max-width: 540px; margin: 0 auto; width: 100%; position: relative; z-index: 10; }
    .category-section { margin-bottom: 32px; }
    .category-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--navy); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 16px; letter-spacing: 0.5px; }

    .link-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-bottom: 14px; text-decoration: none; color: var(--text); font-weight: 600; font-size: 15px; box-shadow: 0 2px 8px rgba(26,31,46,0.03); position: relative; overflow: hidden; transition: all 0.3s ease; }
    .link-btn::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--navy); transform: scaleY(0); transform-origin: bottom; transition: transform 0.3s ease; }
    
    @media (hover: hover) {
      .link-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(26, 31, 46, 0.08); border-color: var(--navy-soft); }
      .link-btn:hover::before { transform: scaleY(1); }
      .link-btn:hover .link-arrow { transform: translateX(6px); color: var(--navy); }
    }
    .link-arrow { color: var(--border); font-size: 18px; transition: all 0.3s ease; }

    /* The "DO NOT CLICK" Button */
    .secret-btn-container { text-align: center; margin-top: 50px; padding-bottom: 40px; }
    .secret-btn { background: transparent; color: var(--accent); border: 2px dashed var(--accent); padding: 12px 30px; border-radius: 30px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; opacity: 0.5; }
    .secret-btn:hover { opacity: 1; background: var(--accent); color: #fff; border-style: solid; box-shadow: 0 4px 15px rgba(192, 57, 43, 0.3); transform: scale(1.05); }

    /* --- FALLING BASKET GAME OVERLAY --- */
    #catchGameOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(26, 31, 46, 0.98); z-index: 9999; display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease; backdrop-filter: blur(5px); }
    #catchGameOverlay.active { opacity: 1; visibility: visible; }
    
    /* Top Bar for Game */
    .game-top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px; width: 100%; max-width: 600px; margin: 0 auto; z-index: 10; }
    .game-score { color: #fcd34d; font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    .exit-btn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
    .exit-btn:hover { background: rgba(255,255,255,0.2); }
    
    /* The Play Area */
    #playArea { flex-grow: 1; position: relative; width: 100%; max-width: 600px; margin: 0 auto; overflow: hidden; touch-action: none; /* Prevents pull-to-refresh on mobile */ }
    
    /* The Basket */
    #basket { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 60px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); z-index: 5; pointer-events: none; transition: transform 0.05s linear; }
    
    /* Falling Items */
    .falling-item { position: absolute; font-size: 40px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); z-index: 4; pointer-events: none; }
    
    /* Points Popup */
    .catch-popup { position: absolute; color: #4ade80; font-weight: 800; font-size: 24px; pointer-events: none; animation: popUpPoints 0.5s forwards; z-index: 20; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    @keyframes popUpPoints { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-40px) scale(1.5); } }

    /* Missed Item Effect */
    .miss-effect { position: absolute; color: var(--accent); font-weight: 800; font-size: 20px; pointer-events: none; animation: fadeDown 0.5s forwards; z-index: 2; opacity: 0.5; }
    @keyframes fadeDown { 0% { opacity: 0.8; transform: translateY(0); } 100% { opacity: 0; transform: translateY(20px); } }
  </style>
</head>
<body>
  
  <div id="catchGameOverlay">
    <div class="game-top-bar">
      <div class="game-score">Score: <span id="scoreValue">0</span></div>
      <button class="exit-btn" id="exitGameBtn">Back to Work</button>
    </div>
    
    <div id="playArea">
      <div id="basket">🧺</div>
      </div>
  </div>

  <nav class="top-nav">
    <div class="nav-wordmark">LOVA</div>
  </nav>

  <div class="profile-header">
    <div class="profile-logo-wrapper">L</div>
    <h1 class="profile-title">Internal Portals</h1>
    <p class="profile-subtitle">Team Directory</p>
  </div>
  
  <div class="content" id="linkContainer">
    <div style="text-align:center; padding: 40px; color: var(--text-3);">Loading directory...</div>
  </div>

  <div class="secret-btn-container">
    <button class="secret-btn" id="startSecretBtn">Do Not Click</button>
  </div>

  <script>
    // --- 1. HUB DIRECTORY LOGIC ---
    const sheetId = '1jsSHt87UsJILNZw7AKsLLqym_iZtEF43SAEEzg6gxzc';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    fetch(url)
      .then(res => res.text())
      .then(text => {
        const data = JSON.parse(text.substring(47).slice(0, -2));
        const container = document.getElementById('linkContainer');
        container.innerHTML = ''; 
        const categories = {};

        data.table.rows.forEach((row) => {
          if (row.c && row.c[1] && row.c[2] && row.c[3]) {
            const type = row.c[1].v ? row.c[1].v.trim() : "Other";
            const name = row.c[2].v ? row.c[2].v.trim() : "";
            const link = row.c[3].v ? row.c[3].v.trim() : "";
            if (name === "Name" || type === "Type" || !name || !link) return;
            if (!categories[type]) categories[type] = [];
            categories[type].push({ name, link });
          }
        });

        const categoryOrder = ["Marketing", "Operation"];
        const sortedCategories = Object.keys(categories).sort((a, b) => {
          let iA = categoryOrder.indexOf(a), iB = categoryOrder.indexOf(b);
          return (iA === -1 ? 999 : iA) - (iB === -1 ? 999 : iB);
        });

        categoryOrder.concat(sortedCategories.filter(c => !categoryOrder.includes(c))).forEach(categoryName => {
          if (!categories[categoryName]) return;
          const section = document.createElement('div');
          section.className = 'category-section';
          section.innerHTML = `<h2 class="category-title">${categoryName}</h2>`;
          categories[categoryName].forEach(item => {
            section.innerHTML += `<a class="link-btn" href="${item.link}" target="_blank"><span>${item.name}</span> <span class="link-arrow">→</span></a>`;
          });
          container.appendChild(section);
        });
      }).catch(err => {
        document.getElementById('linkContainer').innerHTML = `<div style="text-align:center; color:var(--accent);">Failed to load links.</div>`;
      });


    // --- 2. FALLING BASKET GAME LOGIC ---
    const startBtn = document.getElementById('startSecretBtn');
    const exitBtn = document.getElementById('exitGameBtn');
    const overlay = document.getElementById('catchGameOverlay');
    const playArea = document.getElementById('playArea');
    const basket = document.getElementById('basket');
    const scoreDisplay = document.getElementById('scoreValue');
    
    let gameActive = false;
    let score = 0;
    let items = []; // Array to track falling objects
    let gameLoopId;
    let baseSpeed = 3;
    let spawnRate = 60; // Frames between spawns
    let frameCount = 0;
    let basketX = window.innerWidth / 2; // Start in middle

    const ingredients = ['🍰', '🍝', '🍮', '☕', '🍷', '🍕']; 

    // --- Start / Stop Game ---
    startBtn.addEventListener('click', () => {
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden'; // Prevent background scrolling
      initGame();
    });

    exitBtn.addEventListener('click', () => {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
      stopGame();
    });

    function initGame() {
      // Clean up past game
      items.forEach(item => item.el.remove());
      items = [];
      document.querySelectorAll('.catch-popup, .miss-effect').forEach(el => el.remove());
      
      score = 0;
      baseSpeed = 3;
      spawnRate = 60;
      frameCount = 0;
      scoreDisplay.innerText = score;
      gameActive = true;
      
      // Center basket initially based on the container width
      basketX = playArea.offsetWidth / 2;
      updateBasketPosition();

      // Start engine
      cancelAnimationFrame(gameLoopId);
      gameLoop();
    }

    function stopGame() {
      gameActive = false;
      cancelAnimationFrame(gameLoopId);
    }

    // --- Controls: Mouse & Touch ---
    // Listen on the entire overlay so dragging is smooth
    overlay.addEventListener('mousemove', (e) => {
      if (!gameActive) return;
      const rect = playArea.getBoundingClientRect();
      // Calculate X relative to the play area
      let rawX = e.clientX - rect.left;
      setBasketPosition(rawX);
    });

    overlay.addEventListener('touchmove', (e) => {
      if (!gameActive) return;
      e.preventDefault(); // Stop mobile scrolling completely
      const rect = playArea.getBoundingClientRect();
      let rawX = e.touches[0].clientX - rect.left;
      setBasketPosition(rawX);
    }, { passive: false });

    function setBasketPosition(x) {
      // Constrain basket within the borders of the play area
      const halfWidth = basket.offsetWidth / 2;
      const maxRight = playArea.offsetWidth - halfWidth;
      
      if (x < halfWidth) x = halfWidth;
      if (x > maxRight) x = maxRight;
      
      basketX = x;
      updateBasketPosition();
    }

    function updateBasketPosition() {
      // We use CSS transform for buttery smooth movement
      basket.style.transform = `translateX(calc(${basketX}px - 50%))`;
    }

    // --- Spawning Logic ---
    function spawnItem() {
      const el = document.createElement('div');
      el.className = 'falling-item';
      el.innerText = ingredients[Math.floor(Math.random() * ingredients.length)];
      
      // Spawn within bounds
      const spawnMargin = 30;
      const randomX = Math.floor(Math.random() * (playArea.offsetWidth - spawnMargin * 2)) + spawnMargin;
      
      el.style.left = `${randomX}px`;
      el.style.top = `-50px`; // Start above screen
      playArea.appendChild(el);

      // Slight speed variation per item
      const itemSpeed = baseSpeed + (Math.random() * 2 - 1);

      items.push({
        el: el,
        x: randomX,
        y: -50,
        speed: itemSpeed
      });
    }

    // --- Visual Effects ---
    function showCatchText(x, y) {
      const pop = document.createElement('div');
      pop.className = 'catch-popup';
      pop.innerText = '+10';
      pop.style.left = `${x - 10}px`;
      pop.style.top = `${y - 20}px`;
      playArea.appendChild(pop);
      setTimeout(() => pop.remove(), 500);
    }

    function showMissText(x, y) {
      const miss = document.createElement('div');
      miss.className = 'miss-effect';
      miss.innerText = 'Drop!';
      miss.style.left = `${x - 10}px`;
      miss.style.top = `${y - 20}px`;
      playArea.appendChild(miss);
      setTimeout(() => miss.remove(), 500);
    }

    // --- Main Game Engine ---
    function gameLoop() {
      if (!gameActive) return;

      frameCount++;

      // Difficulty Scaling
      if (frameCount % 600 === 0) { // Every ~10 seconds
        baseSpeed += 0.5; // Items fall faster
        if (spawnRate > 20) spawnRate -= 5; // Items spawn more frequently
      }

      // Spawning
      if (frameCount % spawnRate === 0) {
        spawnItem();
      }

      // Physics & Collision Detection
      // Calculate hit zone based on basket's current bottom position
      const catchLine = playArea.offsetHeight - 80; // Roughly the height of the basket rim
      const catchRadius = 45; // How close X needs to be to catch it

      for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        
        // Move item down
        item.y += item.speed;
        item.el.style.top = `${item.y}px`;

        // Check if it crossed the catch line
        if (item.y > catchLine && item.y < catchLine + 40) {
          // Check X axis alignment
          if (Math.abs(item.x - basketX) < catchRadius) {
            // CAUGHT IT!
            score += 10;
            scoreDisplay.innerText = score;
            showCatchText(item.x, catchLine);
            item.el.remove();
            items.splice(i, 1);
            continue;
          }
        }

        // Check if it hit the floor (Missed)
        if (item.y > playArea.offsetHeight) {
          showMissText(item.x, playArea.offsetHeight);
          item.el.remove();
          items.splice(i, 1);
        }
      }

      gameLoopId = requestAnimationFrame(gameLoop);
    }

    // Handle window resize dynamically to keep basket inside
    window.addEventListener('resize', () => {
      if (gameActive) setBasketPosition(basketX);
    });

  </script>
</body>
</html>
