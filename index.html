<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LOVA — Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a1f2e; --navy-soft: #2d3447; --canvas: #f7f5f0; --surface: #ffffff;
      --border: #e4e1db; --text: #1a1f2e; --text-2: #5a5750; --text-3: #9a9690; --accent: #c0392b;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; background: var(--canvas); min-height: 100vh; padding-bottom: 60px; overflow-x: hidden; }
    
    /* Top Nav */
    .top-nav { background: var(--navy); padding: 13px 16px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(26,31,46,0.15); }
    .nav-wordmark { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 2px; text-transform: uppercase; }

    /* Profile Header Section */
    .profile-header { display: flex; flex-direction: column; align-items: center; padding: 45px 20px 30px; text-align: center; }
    .profile-photos { display: flex; gap: 16px; margin-bottom: 18px; position: relative; }
    
    /* The Clickable Easter Egg Trigger */
    .profile-logo-wrapper { position: relative; display: flex; align-items: center; justify-content: center; width: 84px; height: 84px; background: var(--navy); border-radius: 50%; color: #fff; font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 700; box-shadow: 0 8px 24px rgba(26,31,46,0.12); cursor: pointer; user-select: none; transition: transform 0.1s; }
    .profile-logo-wrapper:active { transform: scale(0.9); background: var(--accent); }
    
    /* Uploaded Images mapped to .png */
    .profile-photo { width: 84px; height: 84px; background-size: cover; background-position: center; border-radius: 50%; box-shadow: 0 8px 24px rgba(26,31,46,0.12); border: 4px solid var(--surface); position: relative; background-color: #e4e1db; }
    .p-lucas { background-image: url('Lucas.png'); }
    .p-jeriko { background-image: url('Jeriko.png'); }
    .photo-label { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

    .profile-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; margin-bottom: 4px; }
    .profile-subtitle { font-size: 13px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 2px; }

    /* Content & Links */
    .content { padding: 0 20px; max-width: 540px; margin: 0 auto; width: 100%; position: relative; z-index: 10; }
    .category-section { margin-bottom: 32px; }
    .category-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--navy); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 16px; letter-spacing: 0.5px; }

    .link-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-bottom: 14px; text-decoration: none; color: var(--text); font-weight: 600; font-size: 15px; box-shadow: 0 2px 8px rgba(26,31,46,0.03); position: relative; overflow: hidden; transition: all 0.3s ease; }
    .link-btn::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--navy); transform: scaleY(0); transform-origin: bottom; transition: transform 0.3s ease; }
    
    @media (hover: hover) {
      .link-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(26, 31, 46, 0.08); border-color: var(--navy-soft); }
      .link-btn:hover::before { transform: scaleY(1); }
      .link-btn:hover .link-arrow { transform: translateX(6px); color: var(--navy); }
    }
    .link-arrow { color: var(--border); font-size: 18px; transition: all 0.3s ease; }

    /* --- ADVANCED ARCADE GAME CSS --- */
    #gameOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(26, 31, 46, 0.98); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; touch-action: none; }
    
    .game-header { color: #fff; text-align: center; margin-bottom: 20px; }
    .game-header h2 { font-family: 'Playfair Display', serif; font-size: 28px; letter-spacing: 1px; margin-bottom: 5px; color: #fcd34d; text-transform: uppercase; }
    .game-header p { font-size: 14px; color: #cbd5e1; }
    
    #gameCanvas { width: 100%; max-width: 700px; height: 250px; background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%); position: relative; overflow: hidden; border-top: 4px solid var(--navy); border-bottom: 8px solid var(--navy); box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
    
    /* Scrolling Floor Effect */
    .scrolling-floor { position: absolute; bottom: 0; left: 0; width: 200%; height: 20px; background: repeating-linear-gradient( 45deg, var(--navy), var(--navy) 20px, var(--navy-soft) 20px, var(--navy-soft) 40px ); animation: scrollFloor 1s linear infinite; }
    @keyframes scrollFloor { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* The Player (Lucas) */
    #player { width: 55px; height: 55px; position: absolute; bottom: 20px; left: 15%; background-image: url('Lucas.png'); background-size: cover; background-position: center; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 3px solid #fff; z-index: 10; transition: transform 0.1s; }
    
    /* Jump Physics Animation */
    .jump { animation: jumpArc 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
    @keyframes jumpArc { 
      0% { bottom: 20px; transform: rotate(0deg); } 
      40% { bottom: 150px; transform: rotate(15deg); } 
      50% { bottom: 160px; transform: rotate(0deg); } 
      60% { bottom: 150px; transform: rotate(-10deg); } 
      100% { bottom: 20px; transform: rotate(0deg); } 
    }

    /* Dynamic Game Entities (Obstacles & Collectibles) */
    .entity { position: absolute; background-size: cover; background-position: center; z-index: 5; border-radius: 50%; }
    
    /* Obstacle: Jeriko */
    .obstacle { width: 50px; height: 50px; bottom: 20px; background-image: url('Jeriko.png'); border: 3px solid var(--accent); box-shadow: 0 0 15px rgba(192, 57, 43, 0.6); }
    .obstacle::after { content: '🔥'; position: absolute; bottom: -10px; right: -5px; font-size: 24px; } /* Fire effect */
    
    /* Collectibles */
    .collectible { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 30px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); animation: floatItem 1s ease-in-out infinite alternate; }
    @keyframes floatItem { from { transform: translateY(-5px); } to { transform: translateY(5px); } }

    /* Score & UI */
    .score-container { display: flex; justify-content: space-between; width: 90%; max-width: 600px; margin-top: 15px; color: #fff; font-size: 22px; font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 1px; }
    .bonus-text { position: absolute; color: #fcd34d; font-weight: 800; font-size: 20px; pointer-events: none; animation: floatUp 0.8s forwards; z-index: 20; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-40px) scale(1.5); } }

    #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
    #gameOverScreen h3 { color: var(--accent); font-size: 36px; font-family: 'Playfair Display', serif; margin-bottom: 10px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    #gameOverScreen p { color: #fff; margin-bottom: 20px; font-size: 18px; }
    .restart-btn { background: #fcd34d; color: var(--navy); border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
  
  <div id="gameOverlay">
    <button class="close-btn" onclick="closeGame()">Exit Game</button>
    <div class="game-header">
      <h2>LOVA Rush</h2>
      <p>Tap screen to jump! Collect items, dodge the Chef.</p>
    </div>
    
    <div id="gameCanvas">
      <div class="scrolling-floor" id="floor"></div>
      <div id="player"></div>
      
      <div id="gameOverScreen">
        <h3>ORDER UP!</h3>
        <p>Final Score: <span id="finalScoreText">0</span></p>
        <button class="restart-btn" onclick="startGame()">Play Again</button>
      </div>
    </div>
    
    <div class="score-container">
      <div>Score: <span id="gameScore">00000</span></div>
      <div style="font-size:16px; color:#cbd5e1; align-self:center;">Level: <span id="gameLevel">1</span></div>
    </div>
  </div>

  <nav class="top-nav">
    <div class="nav-wordmark">LOVA</div>
  </nav>

  <div class="profile-header">
    <div class="profile-photos">
      <div class="profile-logo-wrapper" id="secretTrigger">L</div>
      <div class="profile-photo p-lucas"><span class="photo-label">CEO</span></div>
      <div class="profile-photo p-jeriko"><span class="photo-label">Chef</span></div>
    </div>
    <h1 class="profile-title">Internal Portals</h1>
    <p class="profile-subtitle">Team Directory</p>
  </div>
  
  <div class="content" id="linkContainer">
    <div style="text-align:center; padding: 40px; color: var(--text-3);">Loading directory...</div>
  </div>

  <script>
    // --- 1. HUB DIRECTORY LOGIC ---
    const sheetId = '1jsSHt87UsJILNZw7AKsLLqym_iZtEF43SAEEzg6gxzc';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    fetch(url)
      .then(res => res.text())
      .then(text => {
        const data = JSON.parse(text.substring(47).slice(0, -2));
        const container = document.getElementById('linkContainer');
        container.innerHTML = ''; 
        const categories = {};

        data.table.rows.forEach((row) => {
          if (row.c && row.c[1] && row.c[2] && row.c[3]) {
            const type = row.c[1].v ? row.c[1].v.trim() : "Other";
            const name = row.c[2].v ? row.c[2].v.trim() : "";
            const link = row.c[3].v ? row.c[3].v.trim() : "";
            if (name === "Name" || type === "Type" || !name || !link) return;
            if (!categories[type]) categories[type] = [];
            categories[type].push({ name, link });
          }
        });

        const categoryOrder = ["Marketing", "Operation"];
        const sortedCategories = Object.keys(categories).sort((a, b) => {
          let iA = categoryOrder.indexOf(a), iB = categoryOrder.indexOf(b);
          return (iA === -1 ? 999 : iA) - (iB === -1 ? 999 : iB);
        });

        sortedCategories.forEach(categoryName => {
          const section = document.createElement('div');
          section.className = 'category-section';
          section.innerHTML = `<h2 class="category-title">${categoryName}</h2>`;
          categories[categoryName].forEach(item => {
            section.innerHTML += `<a class="link-btn" href="${item.link}" target="_blank"><span>${item.name}</span><span class="link-arrow">→</span></a>`;
          });
          container.appendChild(section);
        });
      }).catch(err => console.error(err));


    // --- 2. ADVANCED RUNNER GAME LOGIC ---
    const trigger = document.getElementById('secretTrigger');
    const overlay = document.getElementById('gameOverlay');
    const canvas = document.getElementById('gameCanvas');
    const player = document.getElementById('player');
    const scoreDisplay = document.getElementById('gameScore');
    const levelDisplay = document.getElementById('gameLevel');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreText = document.getElementById('finalScoreText');
    const floor = document.getElementById('floor');
    
    let clickCount = 0;
    let gameLoopId, spawnId;
    let score = 0, level = 1;
    let gameSpeed = 6; // Pixels per frame
    let isGameOver = true;
    let isJumping = false;
    
    const collectibles = ['🍰', '🍝', '🍮', '☕', '🍷']; // Fun custom elements!

    // Easter Egg Trigger
    trigger.addEventListener('click', () => {
      clickCount++;
      if(clickCount >= 5) {
        overlay.style.display = 'flex';
        startGame();
        clickCount = 0;
      }
      setTimeout(() => clickCount = 0, 2000); 
    });

    function closeGame() {
      overlay.style.display = 'none';
      endGame(true);
    }

    function jump() {
      if (isGameOver || isJumping) return;
      isJumping = true;
      player.classList.add("jump");
      setTimeout(() => { 
        player.classList.remove("jump"); 
        isJumping = false; 
      }, 600); // matches CSS animation
    }

    overlay.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'BUTTON') { e.preventDefault(); jump(); } }, {passive: false});
    overlay.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'BUTTON') jump(); });
    window.addEventListener('keydown', (e) => { if (e.code === 'Space' && overlay.style.display === 'flex') { e.preventDefault(); jump(); }});

    function startGame() {
      // Reset State
      document.querySelectorAll('.entity').forEach(e => e.remove());
      isGameOver = false;
      score = 0;
      level = 1;
      gameSpeed = 5;
      scoreDisplay.innerText = "00000";
      levelDisplay.innerText = level;
      gameOverScreen.style.display = 'none';
      floor.style.animationDuration = '1s';
      
      // Start Loops
      gameLoopId = setInterval(updateGame, 20); // 50fps
      scheduleNextSpawn();
    }

    function scheduleNextSpawn() {
      if (isGameOver) return;
      // Spawn something between 0.8s and 2s depending on level
      let delay = Math.random() * (2000 - (level * 100)) + 800;
      spawnId = setTimeout(() => {
        spawnEntity();
        scheduleNextSpawn();
      }, Math.max(delay, 600));
    }

    function spawnEntity() {
      const entity = document.createElement('div');
      entity.className = 'entity';
      
      // 70% chance Obstacle (Jeriko), 30% chance Collectible
      const isObstacle = Math.random() > 0.3;
      
      if (isObstacle) {
        entity.classList.add('obstacle');
        // Randomize speed slightly for unpredictability
        entity.dataset.speedMod = (Math.random() * 2) - 0.5; 
      } else {
        entity.classList.add('collectible');
        entity.innerText = collectibles[Math.floor(Math.random() * collectibles.length)];
        // Put collectibles higher in the air so player HAS to jump
        entity.style.bottom = (Math.random() * 50 + 80) + 'px'; 
        entity.dataset.speedMod = 0;
      }
      
      entity.style.left = canvas.offsetWidth + 'px';
      canvas.appendChild(entity);
    }

    function showBonusText(amount, x, y) {
      const txt = document.createElement('div');
      txt.className = 'bonus-text';
      txt.innerText = '+' + amount;
      txt.style.left = x + 'px';
      txt.style.top = y + 'px';
      canvas.appendChild(txt);
      setTimeout(() => txt.remove(), 800);
    }

    function updateGame() {
      // Update Score & Level
      score += 1;
      scoreDisplay.innerText = score.toString().padStart(5, '0');
      
      if (score % 500 === 0) {
        level++;
        levelDisplay.innerText = level;
        gameSpeed += 0.5; // Game gets faster!
        floor.style.animationDuration = (1 / (gameSpeed/5)) + 's';
      }

      // Move entities and check collisions
      const entities = document.querySelectorAll('.entity');
      const pRect = player.getBoundingClientRect();
      
      entities.forEach(ent => {
        let currentLeft = parseFloat(ent.style.left);
        let speedMod = parseFloat(ent.dataset.speedMod) || 0;
        
        // Move left
        currentLeft -= (gameSpeed + speedMod);
        ent.style.left = currentLeft + 'px';
        
        // Remove if off screen
        if (currentLeft < -60) {
          ent.remove();
          return;
        }

        // Collision Check
        const eRect = ent.getBoundingClientRect();
        // Margin forgiveness (hitbox)
        const margin = 15; 
        
        if (
          pRect.right - margin > eRect.left &&
          pRect.left + margin < eRect.right &&
          pRect.bottom > eRect.top + margin &&
          pRect.top + margin < eRect.bottom
        ) {
          if (ent.classList.contains('obstacle')) {
            endGame(false);
          } else if (ent.classList.contains('collectible')) {
            // Caught a bonus item!
            score += 200;
            showBonusText(200, currentLeft, eRect.top - 20);
            ent.remove();
          }
        }
      });
    }

    function endGame(silent) {
      isGameOver = true;
      clearInterval(gameLoopId);
      clearTimeout(spawnId);
      floor.style.animationDuration = '0s'; // stop floor
      
      if(!silent) {
        finalScoreText.innerText = score;
        gameOverScreen.style.display = 'flex';
      }
    }
  </script>
</body>
</html>
